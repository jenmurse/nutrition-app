lex;align-items:center;gap:8px\"><span style=\"width:6px;height:6px;border-radius:9999px;background:#9C5E1F\"><\u002Fspan>At limit<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Err -->\n    <div style=\"border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:32px;background:var(--bg)\">\n      <div class=\"kicker ink\">§ Over / error<\u002Fdiv>\n      <div style=\"margin-top:18px;display:flex;align-items:flex-end;gap:14px\">\n        <div style=\"width:64px;height:64px;background:#A33A28\"><\u002Fdiv>\n        <div style=\"width:64px;height:64px;background:#F0DCD6;border:1px solid var(--rule-faint)\"><\u002Fdiv>\n        <div style=\"flex:1\">\n          <div class=\"mono\" style=\"font-size:10px;color:var(--muted);letter-spacing:0.06em\">Ink #A33A28 · Tint #F0DCD6<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--fg-2);margin-top:6px;line-height:1.55\">Iron-oxide red. Concerning, not catastrophic. Reserve full saturation for actual errors.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:20px\"><span style=\"background:#F0DCD6;color:#A33A28;padding:5px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px\"><span style=\"width:6px;height:6px;border-radius:9999px;background:#A33A28\"><\u002Fspan>Over<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:32px;font-size:13.5px;color:var(--fg-2);max-width:64ch;line-height:1.65\">\n    <strong style=\"color:var(--fg);font-weight:500\">Rule:<\u002Fstrong> status color shows up only in pills, dots, and a single line of meta text. Never as a full background, never bordering an entire card. The page stays paper.\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     04 · MOTION\n     ============================================================ -->\n<section id=\"motion\" data-screen-label=\"04 Motion\">\n  <div class=\"section-head\">\n    <h2>Editorial transitions, <em>tactile<\u002Fem> micro-moves.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>04<\u002Fb>Motion<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Big things move slowly and softly. Small things click. Hover any tile to replay.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"motion-grid\">\n\n    <div class=\"motion-cell\">\n      <div class=\"motion-head\"><span class=\"motion-name\">Page enter<\u002Fspan><span class=\"motion-id\">M / page<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-stage replay-on\" data-replay=\"\">\n        <span class=\"play-hint\">▶ hover to replay<\u002Fspan>\n        <div class=\"demo-page-card demo-page\">\n          <h4>Today's plan<\u002Fh4>\n          <p>3 meals · 1,847 kcal<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"motion-spec\"><b>Page Transition<\u002Fb>opacity 0 → 1 · translateY 20 → 0<br>420ms · ease-out (0.23, 1, 0.32, 1)<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"motion-cell\">\n      <div class=\"motion-head\"><span class=\"motion-name\">Stagger reveal<\u002Fspan><span class=\"motion-id\">M / stagger<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-stage replay-on\" data-replay=\"\" style=\"flex-direction:column;gap:10px;align-items:stretch;padding:24px\">\n        <span class=\"play-hint\">▶ hover to replay<\u002Fspan>\n        <div class=\"demo-rise\" style=\"animation-delay:0ms\"><div style=\"background:var(--bg);border:1px solid var(--rule);padding:10px 14px;font-family:var(--mono);font-size:11px\">01 — Calories <span style=\"float:right\">1,247<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"demo-rise\" style=\"animation-delay:80ms\"><div style=\"background:var(--bg);border:1px solid var(--rule);padding:10px 14px;font-family:var(--mono);font-size:11px\">02 — Protein  <span style=\"float:right\">94g<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"demo-rise\" style=\"animation-delay:160ms\"><div style=\"background:var(--bg);border:1px solid var(--rule);padding:10px 14px;font-family:var(--mono);font-size:11px\">03 — Fiber    <span style=\"float:right\">28g<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"motion-spec\"><b>List Stagger<\u002Fb>each row · 360ms rise<br>80ms delay · max stagger window 320ms<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"motion-cell\">\n      <div class=\"motion-head\"><span class=\"motion-name\">Hairline reveal<\u002Fspan><span class=\"motion-id\">M / rule<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-stage replay-on\" data-replay=\"\" style=\"flex-direction:column;gap:14px\">\n        <span class=\"play-hint\">▶ hover to replay<\u002Fspan>\n        <span style=\"font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)\">Pantry · 184 items<\u002Fspan>\n        <div class=\"demo-rule-line demo-rule\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"motion-spec\"><b>Section Rule<\u002Fb>scaleX 0 → 1 · transform-origin left<br>320ms · runs after section heading enter<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"motion-cell\">\n      <div class=\"motion-head\"><span class=\"motion-name\">Press · tactile<\u002Fspan><span class=\"motion-id\">M / press<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-stage replay-on\" data-replay=\"\">\n        <span class=\"play-hint\">▶ hover to replay<\u002Fspan>\n        <button class=\"demo-btn demo-press\">Save Recipe →<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"motion-spec\"><b>Active state<\u002Fb>scale 1 → 0.97 → 1 · 280ms<br>applies to all enabled buttons (already in app)<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"motion-cell\">\n      <div class=\"motion-head\"><span class=\"motion-name\">Sheet · mobile<\u002Fspan><span class=\"motion-id\">M / sheet<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-stage replay-on\" data-replay=\"\" style=\"padding:0;background:#222\">\n        <span class=\"play-hint\" style=\"color:rgba(255,255,255,0.5)\">▶ hover to replay<\u002Fspan>\n        <div class=\"demo-sheet-frame demo-sheet\">\n          <div class=\"demo-sheet-handle\"><\u002Fdiv>\n          <span style=\"font-family:var(--sans);font-weight:600;font-size:16px;letter-spacing:-0.015em\">Add ingredient<\u002Fspan>\n          <span style=\"font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase\">Search USDA<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"motion-spec\"><b>Bottom sheet<\u002Fb>translateY 100% → 0 · 360ms<br>scrim fade-in synchronized · ease-out<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"motion-cell\">\n      <div class=\"motion-head\"><span class=\"motion-name\">Counter tick<\u002Fspan><span class=\"motion-id\">M / count<\u002Fspan><\u002Fdiv>\n      <div class=\"motion-stage replay-on\" data-replay=\"\">\n        <span class=\"play-hint\">▶ hover to replay<\u002Fspan>\n        <div style=\"display:flex;align-items:baseline;gap:12px\">\n          <span class=\"demo-counter-num demo-counter\">1,247<\u002Fspan>\n          <span style=\"font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em\">kcal · today<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"motion-spec\"><b>Live values<\u002Fb>opacity + translateY −4 → 0 · 240ms<br>fires on data change · DM Mono · tabular-nums<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- motion principles -->\n  <div style=\"margin-top:64px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--rule);border-left:1px solid var(--rule)\">\n    <div style=\"border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:28px 24px;background:var(--bg)\">\n      <div class=\"kicker ink\">Easing — <span class=\"mono\">cubic-bezier(0.23, 1, 0.32, 1)<\u002Fspan><\u002Fdiv>\n      <p style=\"margin-top:14px;font-size:13.5px;line-height:1.6;color:var(--fg-2)\">One curve does 90% of the work. Soft start, decisive finish — like a page settling.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:28px 24px;background:var(--bg)\">\n      <div class=\"kicker ink\">Durations<\u002Fdiv>\n      <p style=\"margin-top:14px;font-size:13.5px;line-height:1.6;color:var(--fg-2)\"><b style=\"color:var(--fg);font-weight:500\">120ms<\u002Fb> — hover, focus, color shift<br><b style=\"color:var(--fg);font-weight:500\">280ms<\u002Fb> — buttons, toggles<br><b style=\"color:var(--fg);font-weight:500\">360ms<\u002Fb> — sheets, modals<br><b style=\"color:var(--fg);font-weight:500\">420ms<\u002Fb> — page transitions<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:28px 24px;background:var(--bg)\">\n      <div class=\"kicker ink\">Don't animate<\u002Fdiv>\n      <p style=\"margin-top:14px;font-size:13.5px;line-height:1.6;color:var(--fg-2)\">Color of body text. Border-color of containers. Anything &gt; 600ms. Anything that distracts from data.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border-bottom:1px solid var(--rule);padding:28px 24px;background:var(--bg)\">\n      <div class=\"kicker ink\">Always respect<\u002Fdiv>\n      <p style=\"margin-top:14px;font-size:13.5px;line-height:1.6;color:var(--fg-2)\"><code>prefers-reduced-motion: reduce<\u002Fcode> — replace transitions with instant state changes, keep opacity fades only.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     05 · MODALS\n     ============================================================ -->\n<section id=\"modals\" data-screen-label=\"05 Modals\">\n  <div class=\"section-head\">\n    <h2>Sheets carry forms. <em>Centered cards<\u002Fem> ask one question.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>05<\u002Fb>Modals<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Four patterns. Use the right one and density problems go away.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"modal-grid\">\n\n    <!-- Sheet -->\n    <div class=\"modal-frame\">\n      <div class=\"m-lbl\"><span class=\"name\">Bottom sheet — for forms<\u002Fspan><span class=\"id\">MOD / sheet<\u002Fspan><\u002Fdiv>\n      <div class=\"viewport-mock\">\n        <div class=\"scrim\"><\u002Fdiv>\n        <div class=\"sheet\">\n          <div class=\"handle\"><\u002Fdiv>\n          <span class=\"lbl\">§ Add ingredient<\u002Fspan>\n          <h4>Tomatoes, vine-ripened<\u002Fh4>\n          <div class=\"field\"><span class=\"lbl\">Quantity<\u002Fspan><input value=\"3 medium\"><\u002Fdiv>\n          <div class=\"field\"><span class=\"lbl\">Storage<\u002Fspan><input value=\"Counter · 4 days\"><\u002Fdiv>\n          <div class=\"actions\">\n            <span class=\"kicker\">Drag handle to dismiss<\u002Fspan>\n            <button class=\"ed-btn primary\">Save →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;font-size:13px;line-height:1.6;color:var(--fg-2)\">\n        <strong style=\"color:var(--fg);font-weight:500\">When:<\u002Fstrong> any form with &gt; 1 input.\n        Mobile-native, keyboard-friendly, dismissible by drag. <code>border-radius: 0<\u002Fcode>\n        even at top — sharp corners are a brand commitment.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Confirm -->\n    <div class=\"modal-frame\">\n      <div class=\"m-lbl\"><span class=\"name\">Centered confirm — for one question<\u002Fspan><span class=\"id\">MOD / confirm<\u002Fspan><\u002Fdiv>\n      <div class=\"viewport-mock\">\n        <div class=\"scrim\"><\u002Fdiv>\n        <div class=\"confirm\">\n          <span class=\"e\">§ Destructive · undoable<\u002Fspan>\n          <h4>Delete <em>\"Sunday roast\"<\u002Fem>?<\u002Fh4>\n          <p>This recipe is used in 2 meal plans. Removing it will leave those slots empty — meal logs are kept.<\u002Fp>\n          <div class=\"actions\">\n            <button class=\"ed-btn\">Cancel<\u002Fbutton>\n            <button class=\"ed-btn\" style=\"border-color:var(--fg);color:var(--fg)\">Delete recipe<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;font-size:13px;line-height:1.6;color:var(--fg-2)\">\n        <strong style=\"color:var(--fg);font-weight:500\">When:<\u002Fstrong> single-question\n        confirmations, destructive actions, errors that need attention. Italic serif on the\n        verb gives it weight without yelling.\n        <span style=\"display:block;margin-top:10px;padding-top:10px;border-top:1px solid var(--rule);color:var(--fg)\"><strong style=\"font-weight:500\">Per Jen:<\u002Fstrong> destructive buttons stay ink-on-paper — not red. The word \"Delete\" + the modal context carries the warning. Status colors live in pills and inline copy, never as a CTA fill.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Command palette -->\n    <div class=\"modal-frame\">\n      <div class=\"m-lbl\"><span class=\"name\">Command palette — for navigation<\u002Fspan><span class=\"id\">MOD / cmd<\u002Fspan><\u002Fdiv>\n      <div class=\"viewport-mock\">\n        <div class=\"scrim\"><\u002Fdiv>\n        <div class=\"command\">\n          <div class=\"search\">\n            <span class=\"glyph\">⌘K<\u002Fspan>\n            <input value=\"add lentil\">\n          <\u002Fdiv>\n          <div class=\"results\">\n            <div class=\"row sel\"><span>Add <em style=\"font-family:var(--serif-display);font-style:italic\">lentil<\u002Fem> soup to Tuesday dinner<\u002Fspan><span class=\"key\">↵<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><span>Open recipe <em style=\"font-family:var(--serif-display);font-style:italic\">Lentils &amp; tahini<\u002Fem><\u002Fspan><span class=\"key\">→<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><span>Pantry — 3 lentil ingredients<\u002Fspan><span class=\"key\">P<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><span>Search USDA · \"lentil\"<\u002Fspan><span class=\"key\">U<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;font-size:13px;line-height:1.6;color:var(--fg-2)\">\n        <strong style=\"color:var(--fg);font-weight:500\">When:<\u002Fstrong> ⌘K everywhere. Single\n        text field, ranked results, keyboard-only nav. The fastest path through a tool for\n        people who actually use it daily.\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Toast -->\n    <div class=\"modal-frame\">\n      <div class=\"m-lbl\"><span class=\"name\">Toast — for confirmation<\u002Fspan><span class=\"id\">MOD / toast<\u002Fspan><\u002Fdiv>\n      <div class=\"toast-stage\">\n        <div class=\"toast\">\n          <span><b>Recipe saved.<\u002Fb><\u002Fspan>\n          <button class=\"undo\">Undo<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:18px;font-size:13px;line-height:1.6;color:var(--fg-2)\">\n        <strong style=\"color:var(--fg);font-weight:500\">When:<\u002Fstrong> non-blocking\n        confirmations of completed actions. Always include Undo for destructive ops.\n        Bottom-center, 4-second dismiss, ink-on-paper inverted.\n        <span style=\"display:block;margin-top:10px;padding-top:10px;border-top:1px solid var(--rule);color:var(--fg)\"><strong style=\"font-weight:500\">Per Jen — re: the current top confirm/dismiss bar:<\u002Fstrong> the existing green-on-success / red-on-error inline banner is being <em style=\"font-family:var(--serif-display);font-style:italic\">replaced<\u002Fem> by this toast. The status colors stay (warm palette, §04b), but the bar itself loses its place — toasts handle confirmations, sheets handle anything that needs more than one line.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     06 · MOBILE\n     ============================================================ -->\n<section id=\"mobile\" data-screen-label=\"06 Mobile\">\n  <div class=\"section-head\">\n    <h2>The hardest one — make it feel like an app, <em>still feel like a magazine<\u002Fem>.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>06<\u002Fb>Mobile<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Three nav patterns explored. None of them is \"wrong.\" Pick by what you want the app to feel like.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"mobile-grid\">\n\n    <!-- Pattern A — current bottom tabs -->\n    <div>\n      <div class=\"phone\">\n        <div class=\"status\"><span>9:41<\u002Fspan><span class=\"dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"topbar\">\n            <span class=\"b\" style=\"font-family:var(--sans);font-weight:600;letter-spacing:-0.02em\">Good Measure<\u002Fspan>\n            <span class=\"m\">Sun · 04.27<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Mains<\u002Fspan><span class=\"name\">Roasted carrots &amp; lentils<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Sides<\u002Fspan><span class=\"name\">Yogurt, dill, lemon<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Mains<\u002Fspan><span class=\"name\">White beans, pomegranate<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Sides<\u002Fspan><span class=\"name\">Slow-cooked greens<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <nav class=\"nav-tab\">\n          <div class=\"t on\"><span class=\"lbl\">Today<\u002Fspan><\u002Fdiv>\n          <div class=\"t\"><span class=\"lbl\">Recipes<\u002Fspan><\u002Fdiv>\n          <div class=\"t\"><span class=\"lbl\">Pantry<\u002Fspan><\u002Fdiv>\n          <div class=\"t\"><span class=\"lbl\">Plan<\u002Fspan><\u002Fdiv>\n        <\u002Fnav>\n      <\u002Fdiv>\n      <div class=\"mobile-meta\">\n        <div class=\"num\">A · Bottom tabs<\u002Fdiv>\n        <div class=\"name\" style=\"margin-top:4px\">App-like. Familiar. Safe.<\u002Fdiv>\n        <div class=\"desc\">Reduced from 5 to 4 tabs. Mono labels keep it editorial. <strong style=\"color:var(--fg);font-weight:500\">Text-only — no icons.<\u002Fstrong> The brand is a grid; pictograms would just be more rectangles. Active state = ink + 1px underline; inactive = muted.<\u002Fdiv>\n        <div class=\"verdict\"><span class=\"pro\">✓<\u002Fspan> Most learnable — every iOS user knows it<br><span class=\"con\">⚠<\u002Fspan> Bottom strip steals editorial real estate<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Pattern B — editorial top + bottom rail -->\n    <div>\n      <div class=\"phone\">\n        <div class=\"status\"><span>9:41<\u002Fspan><span class=\"dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"topbar\">\n            <span class=\"b\" style=\"font-family:var(--sans);font-weight:600;letter-spacing:-0.02em\">Good Measure<\u002Fspan>\n            <span class=\"m\">Sun · 04.27<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:6px 0 10px\">§ Today · 04 / 07<\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:11px;letter-spacing:0.04em;color:var(--fg);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--rule)\">1,847<span style=\"font-size:9px;color:var(--muted);margin-left:2px\">kcal<\u002Fspan> · 124<span style=\"font-size:9px;color:var(--muted);margin-left:2px\">g<\u002Fspan> protein · 38<span style=\"font-size:9px;color:var(--muted);margin-left:2px\">g<\u002Fspan> fiber<\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Mains<\u002Fspan><span class=\"name\">Roasted carrots &amp; lentils<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Sides<\u002Fspan><span class=\"name\">Yogurt, dill, lemon<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Mains<\u002Fspan><span class=\"name\">White beans, pomegranate<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <nav class=\"nav-bar-top\">\n          <span class=\"menu\"><span class=\"lines\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>Menu<\u002Fspan>\n          <span class=\"index\"><b>02<\u002Fb> / 04 — Today<\u002Fspan>\n        <\u002Fnav>\n      <\u002Fdiv>\n      <div class=\"mobile-meta\">\n        <div class=\"num\">B · Editorial rail<\u002Fdiv>\n        <div class=\"name\" style=\"margin-top:4px\">Magazine-app, not chrome-app.<\u002Fdiv>\n        <div class=\"desc\">Single bottom rail with Menu + section index (\"02/04 — Today\"). Tap \"Menu\" → full-screen overlay with the four sections as large-type targets. Borrows from Pasticceria Verona's chapter structure.<\u002Fdiv>\n        <div class=\"verdict\"><span class=\"pro\">✓<\u002Fspan> Most \"Good Measure\" feeling — different<br><span class=\"con\">⚠<\u002Fspan> Adds a tap to switch sections<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Pattern C — pill nav -->\n    <div>\n      <div class=\"phone\">\n        <div class=\"status\"><span>9:41<\u002Fspan><span class=\"dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"topbar\">\n            <span class=\"b\" style=\"font-family:var(--sans);font-weight:600;letter-spacing:-0.02em\">Good Measure<\u002Fspan>\n            <span class=\"m\">Sun · 04.27<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin:6px 0 12px\">§ Today's plan<\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Breakfast<\u002Fspan><span class=\"name\">Greek yogurt &amp; berries<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Lunch<\u002Fspan><span class=\"name\">Lentil &amp; chard soup<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Dinner<\u002Fspan><span class=\"name\">Roasted carrots &amp; tahini<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"m-list-row\"><div class=\"thumb\"><\u002Fdiv><div class=\"body\"><span class=\"cat\">§ Snack<\u002Fspan><span class=\"name\">Almonds &amp; dates<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <nav class=\"nav-pill\">\n          <span class=\"t on\">Today<\u002Fspan>\n          <span class=\"t\">Recipes<\u002Fspan>\n          <span class=\"t\">Pantry<\u002Fspan>\n          <span class=\"t\">Plan<\u002Fspan>\n        <\u002Fnav>\n      <\u002Fdiv>\n      <div class=\"mobile-meta\">\n        <div class=\"num\">C · Floating pill<\u002Fdiv>\n        <div class=\"name\" style=\"margin-top:4px\">Compact. Quiet. Modern.<\u002Fdiv>\n        <div class=\"desc\">Floating ink-on-paper pill, only 4 mono labels. Sits over content with a small drop shadow. Scrolls don't lose it; doesn't claim a full edge of the screen.<\u002Fdiv>\n        <div class=\"verdict\"><span class=\"pro\">✓<\u002Fspan> Best content-to-chrome ratio<br><span class=\"con\">⚠<\u002Fspan> Risk: hides under thumb on tall phones<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <!-- mobile principles -->\n  <div style=\"margin-top:64px;display:grid;grid-template-columns:1.4fr 1fr;gap:48px;border-top:1px solid var(--rule);padding-top:48px\">\n    <div>\n      <div class=\"kicker ink\" style=\"margin-bottom:14px\">Mobile principles<\u002Fdiv>\n      <ol style=\"list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:18px\">\n        <li style=\"display:flex;gap:18px;align-items:baseline\">\n          <span class=\"mono\" style=\"color:var(--muted);font-size:11px;min-width:28px\">01<\u002Fspan>\n          <div>\n            <div style=\"font-size:14.5px;font-weight:500;color:var(--fg);letter-spacing:-0.005em\">Density is opt-in.<\u002Fdiv>\n            <p style=\"font-size:13px;color:var(--fg-2);line-height:1.6;margin-top:4px\">List view default; grid view toggleable. Don't try to fit everything from the desktop into 360px wide.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:flex;gap:18px;align-items:baseline\">\n          <span class=\"mono\" style=\"color:var(--muted);font-size:11px;min-width:28px\">02<\u002Fspan>\n          <div>\n            <div style=\"font-size:14.5px;font-weight:500;color:var(--fg);letter-spacing:-0.005em\">Editorial wordmark stays in the chrome.<\u002Fdiv>\n            <p style=\"font-size:13px;color:var(--fg-2);line-height:1.6;margin-top:4px\">\"Good Measure\" in the top-left at 14px, every page. Carries the brand into the otherwise-generic phone shell.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:flex;gap:18px;align-items:baseline\">\n          <span class=\"mono\" style=\"color:var(--muted);font-size:11px;min-width:28px\">03<\u002Fspan>\n          <div>\n            <div style=\"font-size:14.5px;font-weight:500;color:var(--fg);letter-spacing:-0.005em\">Section heads keep the §.<\u002Fdiv>\n            <p style=\"font-size:13px;color:var(--fg-2);line-height:1.6;margin-top:4px\">Mono labels with section glyphs (§) are the throughline that connects mobile to desktop to marketing.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:flex;gap:18px;align-items:baseline\">\n          <span class=\"mono\" style=\"color:var(--muted);font-size:11px;min-width:28px\">04<\u002Fspan>\n          <div>\n            <div style=\"font-size:14.5px;font-weight:500;color:var(--fg);letter-spacing:-0.005em\">Forms are sheets. Confirms are centered.<\u002Fdiv>\n            <p style=\"font-size:13px;color:var(--fg-2);line-height:1.6;margin-top:4px\">No exceptions. See Modals chapter.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div>\n      <div class=\"kicker ink\" style=\"margin-bottom:14px\">My recommendation<\u002Fdiv>\n      <div style=\"padding:28px;border:1px solid var(--fg);background:var(--bg)\">\n        <div style=\"font-size:24px;font-weight:500;letter-spacing:-0.02em;line-height:1.15\">\n          Start with <em style=\"font-family:var(--serif-display);font-style:italic\">Pattern B<\u002Fem>.\n        <\u002Fdiv>\n        <p style=\"margin-top:14px;font-size:13.5px;line-height:1.65;color:var(--fg-2)\">\n          The editorial rail is the only one that <em>isn't<\u002Fem> just a recolored generic app.\n          The Menu interaction is the one chance to actually feel different from every\n          other utility in the user's pocket. Worth the extra tap.\n        <\u002Fp>\n        <div style=\"margin-top:18px;padding-top:14px;border-top:1px solid var(--rule);font-size:12.5px;line-height:1.6;color:var(--fg)\">\n          <strong style=\"font-weight:500\">For implementation:<\u002Fstrong> ship Pattern B (editorial rail) in v0.3. Patterns A and C are documented for context only — do not build them. Do not ship a tab bar. The bottom rail is <code>Menu<\u002Fcode> + section index (“02/04 — Today”), not five icons.\n        <\u002Fdiv>\n      <\u002Fdiv>\n        <p style=\"margin-top:14px;font-size:13.5px;line-height:1.65;color:var(--fg-2)\">\n          If user testing reveals discoverability issues, we can layer Pattern C's pill on\n          top — but try B first.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  \n<\u002Fsection>\n\n<!-- ============================================================\n     07a · AUTH (sign-in / sign-up)\n     ============================================================ -->\n<section id=\"auth\" data-screen-label=\"07a Auth\">\n  <div class=\"section-head\">\n    <h2>Auth — <em>two panes<\u002Fem>, one side speaks, the other listens.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>07a<\u002Fb>Auth<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Documenting the built screens. Pull-quote left, form right; sage on the verb, ink on everything else.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- the system in one paragraph -->\n  <div style=\"display:grid;grid-template-columns:1.1fr 2fr;gap:48px;padding:32px 36px;background:var(--bg-2);border:1px solid var(--rule);margin-bottom:48px;align-items:start\">\n    <div>\n      <div class=\"kicker ink\">The pattern<\u002Fdiv>\n      <div style=\"margin-top:14px;font-family:var(--serif-display);font-style:italic;font-size:24px;line-height:1.25;color:var(--fg)\">A two-column door. The left side is the landing page in miniature; the right side is the work.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px;font-size:13.5px;line-height:1.6;color:var(--fg-2)\">\n      <div style=\"display:grid;grid-template-columns:0.7fr 2.4fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--fg)\">Left pane<\u002Fdiv>\n        <div>An eyebrow (\"§ Sign in\" / \"§ Create account\"), a Hero-tier headline with a sage-accented verb phrase, and one line of plain copy. Same voice as the landing hero. Cream background.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:0.7fr 2.4fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--fg)\">Right pane<\u002Fdiv>\n        <div>White ground. Tab toggle (Sign in / Create account). Underlined inputs only — no boxes. Solid ink CTA, full-width. <strong style=\"color:var(--fg);font-weight:500\">\"or\"<\u002Fstrong> divider, then Google as the single OAuth option.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:0.7fr 2.4fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--fg)\">Top chrome<\u002Fdiv>\n        <div>Wordmark left, \"← BACK\" right — same vocabulary as onboarding's chrome bar. Hairline rule below.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:0.7fr 2.4fr;gap:20px\">\n        <div class=\"label\" style=\"color:var(--fg)\">What changed from v1<\u002Fdiv>\n        <div>Dropped magic-link primary; password is the path. Dropped Apple OAuth — Google only. Dropped the centered single-column variant — the two-pane is the canonical layout.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- DESKTOP — sign-in -->\n  <div class=\"kicker ink\" style=\"margin-bottom:14px\">Desktop · sign-in (returning user)<\u002Fdiv>\n  <div style=\"border:1px solid var(--rule);background:var(--bg);margin-bottom:16px\">\n    <!-- chrome bar -->\n    <div style=\"display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid var(--rule)\">\n      <span style=\"font-family:var(--sans);font-weight:600;font-size:15px;letter-spacing:-0.025em\">Good Measure<\u002Fspan>\n      <span style=\"font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg)\">← Back<\u002Fspan>\n    <\u002Fdiv>\n    <!-- two pane -->\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;min-height:520px\">\n      <div style=\"padding:80px 56px;display:flex;flex-direction:column;justify-content:center;background:var(--bg);border-right:1px solid var(--rule)\">\n        <div class=\"ob-eyebrow\" style=\"margin-bottom:24px\">§ Sign in<\u002Fdiv>\n        <h1 style=\"font-family:var(--sans);font-weight:500;font-size:54px;letter-spacing:-0.04em;line-height:1.0;margin:0;max-width:11ch\">Pick up where<br>you <span style=\"color:var(--accent-sage);font-family:var(--serif-display);font-style:italic;font-weight:400\">left off<\u002Fspan>.<\u002Fh1>\n        <p style=\"font-size:14.5px;line-height:1.6;color:var(--fg-2);margin-top:24px;max-width:36ch\">Your pantry, your recipes, the week you were planning.<br>All measured to the gram.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:80px 56px;display:flex;flex-direction:column;justify-content:center;background:#fff\">\n        <div style=\"display:flex;gap:28px;border-bottom:1px solid var(--rule);padding-bottom:0;margin-bottom:28px\">\n          <button class=\"ed-chip is-active\" style=\"padding-bottom:12px\">Sign in<\u002Fbutton>\n          <button class=\"ed-chip\" style=\"padding-bottom:12px\">Create account<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:24px;max-width:340px\">\n          <div>\n            <div class=\"label\" style=\"margin-bottom:6px\">Email<\u002Fdiv>\n            <div style=\"height:1px;background:var(--rule);margin-top:18px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n              <div class=\"label\">Password<\u002Fdiv>\n              <div class=\"label\" style=\"color:var(--muted)\">Forgot<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height:1px;background:var(--rule);margin-top:18px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <button style=\"background:var(--fg);color:var(--bg);font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;padding:18px 0;border:0;cursor:pointer;width:100%;margin-top:8px\">Sign in<\u002Fbutton>\n          <div style=\"display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)\">\n            <div style=\"flex:1;height:1px;background:var(--rule)\"><\u002Fdiv>\n            <span>or<\u002Fspan>\n            <div style=\"flex:1;height:1px;background:var(--rule)\"><\u002Fdiv>\n          <\u002Fdiv>\n          <button style=\"background:#fff;border:1px solid var(--rule);font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:16px 0;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:12px\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 48 48\" aria-hidden=\"true\"><path fill=\"#EA4335\" d=\"M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z\"><\u002Fpath><path fill=\"#4285F4\" d=\"M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z\"><\u002Fpath><path fill=\"#FBBC05\" d=\"M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z\"><\u002Fpath><path fill=\"#34A853\" d=\"M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z\"><\u002Fpath><\u002Fsvg>\n            Continue with Google\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"meta\" style=\"margin:0 0 48px;font-size:12px\">Sign-in form: email + password (with inline \"Forgot\" link), ink CTA, Google OAuth below the rule. Password is shorter than create-account by two fields — same architecture, less friction.<\u002Fp>\n\n  <!-- DESKTOP — create account -->\n  <div class=\"kicker ink\" style=\"margin-bottom:14px\">Desktop · create account (new user)<\u002Fdiv>\n  <div style=\"border:1px solid var(--rule);background:var(--bg);margin-bottom:16px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid var(--rule)\">\n      <span style=\"font-family:var(--sans);font-weight:600;font-size:15px;letter-spacing:-0.025em\">Good Measure<\u002Fspan>\n      <span style=\"font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg)\">← Back<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;min-height:580px\">\n      <div style=\"padding:80px 56px;display:flex;flex-direction:column;justify-content:center;background:var(--bg);border-right:1px solid var(--rule)\">\n        <div class=\"ob-eyebrow\" style=\"margin-bottom:24px\">§ Create account<\u002Fdiv>\n        <h1 style=\"font-family:var(--sans);font-weight:500;font-size:54px;letter-spacing:-0.04em;line-height:1.0;margin:0;max-width:11ch\">Cook the way<br>you <span style=\"color:var(--accent-sage);font-family:var(--serif-display);font-style:italic;font-weight:400\">actually cook<\u002Fspan>.<\u002Fh1>\n        <p style=\"font-size:14.5px;line-height:1.6;color:var(--fg-2);margin-top:24px;max-width:36ch\">Build your pantry once. Plan a week against it.<br>Let the math take care of itself.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:80px 56px;display:flex;flex-direction:column;justify-content:center;background:#fff\">\n        <div style=\"display:flex;gap:28px;border-bottom:1px solid var(--rule);padding-bottom:0;margin-bottom:28px\">\n          <button class=\"ed-chip\" style=\"padding-bottom:12px\">Sign in<\u002Fbutton>\n          <button class=\"ed-chip is-active\" style=\"padding-bottom:12px\">Create account<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:22px;max-width:340px\">\n          <div><div class=\"label\" style=\"margin-bottom:6px\">Name<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:18px\"><\u002Fdiv><\u002Fdiv>\n          <div><div class=\"label\" style=\"margin-bottom:6px\">Email<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:18px\"><\u002Fdiv><\u002Fdiv>\n          <div><div class=\"label\" style=\"margin-bottom:6px\">Password<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:18px\"><\u002Fdiv><\u002Fdiv>\n          <div><div class=\"label\" style=\"margin-bottom:6px\">Confirm password<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:18px\"><\u002Fdiv><\u002Fdiv>\n          <button style=\"background:var(--fg);color:var(--bg);font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;padding:18px 0;border:0;cursor:pointer;width:100%;margin-top:8px\">Create account<\u002Fbutton>\n          <div style=\"display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)\">\n            <div style=\"flex:1;height:1px;background:var(--rule)\"><\u002Fdiv><span>or<\u002Fspan><div style=\"flex:1;height:1px;background:var(--rule)\"><\u002Fdiv>\n          <\u002Fdiv>\n          <button style=\"background:#fff;border:1px solid var(--rule);font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:16px 0;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:12px\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 48 48\" aria-hidden=\"true\"><path fill=\"#EA4335\" d=\"M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z\"><\u002Fpath><path fill=\"#4285F4\" d=\"M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z\"><\u002Fpath><path fill=\"#FBBC05\" d=\"M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z\"><\u002Fpath><path fill=\"#34A853\" d=\"M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z\"><\u002Fpath><\u002Fsvg>\n            Continue with Google\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p class=\"meta\" style=\"margin:0 0 64px;font-size:12px\">Create-account form: four underlined fields — name, email, password, confirm. Same right-pane architecture, just longer. Pull-quote on the left swaps verbs (\"left off\" → \"actually cook\") but the structure is identical.<\u002Fp>\n\n  <!-- left-pane copy library -->\n  <div style=\"border-top:1px solid var(--rule);padding-top:32px;margin-bottom:64px\">\n    <div class=\"kicker ink\" style=\"margin-bottom:18px\">Left-pane copy library — sage falls on the verb phrase<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:0;border:1px solid var(--rule)\">\n      <div style=\"padding:28px 32px;border-right:1px solid var(--rule);background:var(--bg)\">\n        <div class=\"ob-eyebrow\" style=\"margin-bottom:14px\">§ Sign in<\u002Fdiv>\n        <h3 style=\"font-family:var(--sans);font-weight:500;font-size:32px;letter-spacing:-0.035em;line-height:1.05;margin:0\">Pick up where<br>you <span style=\"color:var(--accent-sage);font-family:var(--serif-display);font-style:italic;font-weight:400\">left off<\u002Fspan>.<\u002Fh3>\n        <p style=\"font-size:13px;line-height:1.6;color:var(--fg-2);margin-top:14px\">Your pantry, your recipes, the week you were planning.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:28px 32px;background:var(--bg)\">\n        <div class=\"ob-eyebrow\" style=\"margin-bottom:14px\">§ Create account<\u002Fdiv>\n        <h3 style=\"font-family:var(--sans);font-weight:500;font-size:32px;letter-spacing:-0.035em;line-height:1.05;margin:0\">Cook the way<br>you <span style=\"color:var(--accent-sage);font-family:var(--serif-display);font-style:italic;font-weight:400\">actually cook<\u002Fspan>.<\u002Fh3>\n        <p style=\"font-size:13px;line-height:1.6;color:var(--fg-2);margin-top:14px\">Build your pantry once. Plan a week against it.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:28px 32px;border-top:1px solid var(--rule);border-right:1px solid var(--rule);background:var(--bg)\">\n        <div class=\"ob-eyebrow\" style=\"margin-bottom:14px\">§ Forgot password<\u002Fdiv>\n        <h3 style=\"font-family:var(--sans);font-weight:500;font-size:32px;letter-spacing:-0.035em;line-height:1.05;margin:0\">We'll send you<br>a way <span style=\"color:var(--accent-sage);font-family:var(--serif-display);font-style:italic;font-weight:400\">back in<\u002Fspan>.<\u002Fh3>\n        <p style=\"font-size:13px;line-height:1.6;color:var(--fg-2);margin-top:14px\">Type the email on your account. Reset link comes by email.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:28px 32px;border-top:1px solid var(--rule);background:var(--bg)\">\n        <div class=\"ob-eyebrow\" style=\"margin-bottom:14px\">§ Joining household<\u002Fdiv>\n        <h3 style=\"font-family:var(--sans);font-weight:500;font-size:32px;letter-spacing:-0.035em;line-height:1.05;margin:0\">Pull up a chair<br>at the <span style=\"color:var(--accent-sage);font-family:var(--serif-display);font-style:italic;font-weight:400\">Vanwynsberghes<\u002Fspan>.<\u002Fh3>\n        <p style=\"font-size:13px;line-height:1.6;color:var(--fg-2);margin-top:14px\">You've been invited. Make an account to join their pantry.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"meta\" style=\"margin:18px 0 0;font-size:12px\">Pattern: two-line ink headline with the verb (or in the household case, the family name) in sage. One line of plain copy below. The eyebrow tells you which screen you're on.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- MOBILE -->\n  <div class=\"kicker ink\" style=\"margin-bottom:14px\">Mobile · stacked, not side-by-side<\u002Fdiv>\n  <p class=\"meta\" style=\"margin:0 0 24px;font-size:12.5px;line-height:1.6;max-width:60ch\">On phone, the left pane stacks above the right. Same chrome (wordmark + back), same eyebrow, same Hero copy with sage accent — then a hairline rule, then the form, then the OAuth fallback. The landing page uses the same single-column rhythm so the door and the foyer feel like the same building.<\u002Fp>\n  <div class=\"mobile-grid\">\n    <div>\n      <div class=\"phone\">\n        <div class=\"status\"><span>9:41<\u002Fspan><span class=\"dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"body\" style=\"padding:0\">\n          <!-- chrome -->\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--rule)\">\n            <span style=\"font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:-0.025em\">Good Measure<\u002Fspan>\n            <span style=\"font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase\">← Back<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:24px 20px\">\n            <div style=\"font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px\">§ Sign in<\u002Fdiv>\n            <h2 style=\"font-family:var(--sans);font-weight:500;font-size:28px;letter-spacing:-0.035em;line-height:1.05;margin:0\">Pick up where<br>you <span style=\"color:var(--accent-sage);font-family:var(--serif-display);font-style:italic;font-weight:400\">left off<\u002Fspan>.<\u002Fh2>\n            <p style=\"font-size:12.5px;line-height:1.55;color:var(--fg-2);margin-top:14px\">Your pantry, your recipes, the week you were planning. All measured to the gram.<\u002Fp>\n            <div style=\"display:flex;gap:20px;border-bottom:1px solid var(--rule);margin-top:28px;padding-bottom:0\">\n              <button class=\"ed-chip is-active\" style=\"padding-bottom:10px;font-size:8.5px\">Sign in<\u002Fbutton>\n              <button class=\"ed-chip\" style=\"padding-bottom:10px;font-size:8.5px\">Create account<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:18px;margin-top:20px\">\n              <div><div class=\"label\" style=\"margin-bottom:6px;font-size:8.5px\">Email<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:14px\"><\u002Fdiv><\u002Fdiv>\n              <div><div style=\"display:flex;justify-content:space-between\"><div class=\"label\" style=\"font-size:8.5px\">Password<\u002Fdiv><div class=\"label\" style=\"font-size:8.5px;color:var(--muted)\">Forgot<\u002Fdiv><\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:14px\"><\u002Fdiv><\u002Fdiv>\n              <button style=\"background:var(--fg);color:var(--bg);font-family:var(--sans);font-size:9.5px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;padding:14px 0;border:0;width:100%;margin-top:4px\">Sign in<\u002Fbutton>\n              <div style=\"display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)\"><div style=\"flex:1;height:1px;background:var(--rule)\"><\u002Fdiv><span>or<\u002Fspan><div style=\"flex:1;height:1px;background:var(--rule)\"><\u002Fdiv><\u002Fdiv>\n              <button style=\"background:var(--bg);border:1px solid var(--rule);font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;padding:12px 0;width:100%;display:flex;align-items:center;justify-content:center;gap:8px\">\n                <svg width=\"13\" height=\"13\" viewBox=\"0 0 48 48\" aria-hidden=\"true\"><path fill=\"#EA4335\" d=\"M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z\"><\u002Fpath><path fill=\"#4285F4\" d=\"M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z\"><\u002Fpath><path fill=\"#FBBC05\" d=\"M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z\"><\u002Fpath><path fill=\"#34A853\" d=\"M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z\"><\u002Fpath><\u002Fsvg>\n                Continue with Google\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mobile-meta\">\n        <div class=\"num\">A · Mobile sign-in<\u002Fdiv>\n        <div class=\"name\" style=\"margin-top:4px\">Stacked, hairline-divided.<\u002Fdiv>\n        <div class=\"desc\">Pull-quote on top, form below. The hairline rule under the lede stands in for the desktop column-divider.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div class=\"phone\">\n        <div class=\"status\"><span>9:41<\u002Fspan><span class=\"dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"body\" style=\"padding:0\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--rule)\">\n            <span style=\"font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:-0.025em\">Good Measure<\u002Fspan>\n            <span style=\"font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase\">← Back<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:24px 20px\">\n            <div style=\"font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:14px\">§ Create account<\u002Fdiv>\n            <h2 style=\"font-family:var(--sans);font-weight:500;font-size:28px;letter-spacing:-0.035em;line-height:1.05;margin:0\">Cook the way<br>you <span style=\"color:var(--accent-sage);font-family:var(--serif-display);font-style:italic;font-weight:400\">actually cook<\u002Fspan>.<\u002Fh2>\n            <p style=\"font-size:12.5px;line-height:1.55;color:var(--fg-2);margin-top:14px\">Build your pantry once. Plan a week against it. Let the math take care of itself.<\u002Fp>\n            <div style=\"display:flex;gap:20px;border-bottom:1px solid var(--rule);margin-top:28px\">\n              <button class=\"ed-chip\" style=\"padding-bottom:10px;font-size:8.5px\">Sign in<\u002Fbutton>\n              <button class=\"ed-chip is-active\" style=\"padding-bottom:10px;font-size:8.5px\">Create account<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:16px;margin-top:20px\">\n              <div><div class=\"label\" style=\"margin-bottom:6px;font-size:8.5px\">Name<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:14px\"><\u002Fdiv><\u002Fdiv>\n              <div><div class=\"label\" style=\"margin-bottom:6px;font-size:8.5px\">Email<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:14px\"><\u002Fdiv><\u002Fdiv>\n              <div><div class=\"label\" style=\"margin-bottom:6px;font-size:8.5px\">Password<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:14px\"><\u002Fdiv><\u002Fdiv>\n              <div><div class=\"label\" style=\"margin-bottom:6px;font-size:8.5px\">Confirm password<\u002Fdiv><div style=\"height:1px;background:var(--rule);margin-top:14px\"><\u002Fdiv><\u002Fdiv>\n              <button style=\"background:var(--fg);color:var(--bg);font-family:var(--sans);font-size:9.5px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;padding:14px 0;border:0;width:100%;margin-top:4px\">Create account<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mobile-meta\">\n        <div class=\"num\">B · Mobile create<\u002Fdiv>\n        <div class=\"name\" style=\"margin-top:4px\">Same rhythm, longer form.<\u002Fdiv>\n        <div class=\"desc\">Four fields stacked. OAuth fallback continues below the fold (not shown). The eyebrow + sage verb keeps it editorial, not bureaucratic.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div>\n      <div class=\"phone\">\n        <div class=\"status\"><span>9:41<\u002Fspan><span class=\"dots\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"body\" style=\"padding:0\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--rule)\">\n            <span style=\"font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:-0.025em\">Good Measure<\u002Fspan>\n            <span style=\"font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg)\">Sign in<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;padding:8px 20px;border-bottom:1px solid var(--rule);font-family:var(--mono);font-size:7.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)\">\n            <span>— Calculated, not estimated<\u002Fspan><span style=\"opacity:0.5\">— Optimized…<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:24px 20px\">\n            <div style=\"display:flex;justify-content:space-between;font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:24px\">\n              <span>Good Measure<\u002Fspan><span style=\"text-align:right;max-width:18ch\">A nutrition &amp; meal planning tool<\u002Fspan>\n            <\u002Fdiv>\n            <h2 style=\"font-family:var(--sans);font-weight:500;font-size:32px;letter-spacing:-0.04em;line-height:1.0;margin:0\">A nutrition app for people who <span style=\"color:var(--accent-sage);font-style:italic;font-family:var(--serif-display);font-weight:400\">actually<\u002Fspan> cook.<\u002Fh2>\n            <p style=\"font-size:12.5px;line-height:1.6;color:var(--fg-2);margin-top:18px\">For years I ran my household on two tools: a spreadsheet for nutrition, a recipe app for dinner. <strong style=\"color:var(--fg);font-weight:500\">Good Measure is the version of that setup where the two halves finally talk.<\u002Fstrong><\u002Fp>\n            <div style=\"display:flex;gap:8px;margin-top:24px\">\n              <button style=\"background:var(--fg);color:var(--bg);font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;padding:14px 18px;border:0;flex:1\">Get started ↗<\u002Fbutton>\n              <button style=\"background:transparent;border:1px solid var(--rule);color:var(--fg);font-family:var(--sans);font-size:9px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;padding:14px 18px;flex:1\">See how it works<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"mobile-meta\">\n        <div class=\"num\">C · Landing (reference)<\u002Fdiv>\n        <div class=\"name\" style=\"margin-top:4px\">Same voice, same accent, same chrome.<\u002Fdiv>\n        <div class=\"desc\">The landing page is the auth screens' big sibling. Note the italic-serif \"actually\" — auth uses sans for the verb instead, because there's no italic mood to set up.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- principles -->\n  <div style=\"margin-top:64px;display:grid;grid-template-columns:1.4fr 1fr;gap:48px;border-top:1px solid var(--rule);padding-top:48px\">\n    <div>\n      <div class=\"kicker ink\" style=\"margin-bottom:14px\">Auth principles — what to keep doing<\u002Fdiv>\n      <ol style=\"list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:18px\">\n        <li style=\"display:grid;grid-template-columns:48px 1fr;gap:18px;padding-bottom:14px;border-bottom:1px solid var(--rule-faint)\">\n          <span class=\"mono\" style=\"font-size:11px;color:var(--fg);font-weight:500\">01<\u002Fspan>\n          <div><strong style=\"font-weight:500\">Two panes on desktop, stacked on mobile.<\u002Fstrong> Editorial pull-quote left/top; the work right/below. Hairline rule between them on phone.<\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:grid;grid-template-columns:48px 1fr;gap:18px;padding-bottom:14px;border-bottom:1px solid var(--rule-faint)\">\n          <span class=\"mono\" style=\"font-size:11px;color:var(--fg);font-weight:500\">02<\u002Fspan>\n          <div><strong style=\"font-weight:500\">Sage falls on the verb phrase.<\u002Fstrong> \"left off\", \"actually cook\", \"back in\" — the sage word is what changes between screens. The frame around it is identical.<\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:grid;grid-template-columns:48px 1fr;gap:18px;padding-bottom:14px;border-bottom:1px solid var(--rule-faint)\">\n          <span class=\"mono\" style=\"font-size:11px;color:var(--fg);font-weight:500\">03<\u002Fspan>\n          <div><strong style=\"font-weight:500\">Underlined inputs, not boxes.<\u002Fstrong> The whole product uses hairline-rule fields. Auth follows.<\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:grid;grid-template-columns:48px 1fr;gap:18px;padding-bottom:14px;border-bottom:1px solid var(--rule-faint)\">\n          <span class=\"mono\" style=\"font-size:11px;color:var(--fg);font-weight:500\">04<\u002Fspan>\n          <div><strong style=\"font-weight:500\">Solid ink CTA, full-width.<\u002Fstrong> Sentence-case label (\"Sign in\", \"Create account\"), letter-spaced. No sage on auth buttons — that's status-pill territory only.<\u002Fdiv>\n        <\u002Fli>\n        <li style=\"display:grid;grid-template-columns:48px 1fr;gap:18px\">\n          <span class=\"mono\" style=\"font-size:11px;color:var(--fg);font-weight:500\">05<\u002Fspan>\n          <div><strong style=\"font-weight:500\">Google is the only OAuth.<\u002Fstrong> One option, presented quietly below the \"or\" rule. Apple was considered and dropped — single provider keeps the screen calm.<\u002Fdiv>\n        <\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div style=\"padding:28px;border:1px solid var(--fg);background:var(--bg)\">\n      <div class=\"kicker ink\">Loose ends<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:18px 0 0;display:flex;flex-direction:column;gap:14px;font-size:13px;line-height:1.6;color:var(--fg-2)\">\n        <li>· <strong style=\"color:var(--fg);font-weight:500\">Forgot-password screen<\u002Fstrong> — uses the third pull-quote in the library above (\"a way back in\"). Single email field on the right.<\u002Fli>\n        <li>· <strong style=\"color:var(--fg);font-weight:500\">Household-invite preview<\u002Fstrong> — when there's a token in the URL, the right pane shows the inviting household's name in an outlined card above the form, and the left pull-quote swaps to \"Pull up a chair at the [Family]'s.\"<\u002Fli>\n        <li>· <strong style=\"color:var(--fg);font-weight:500\">Error states<\u002Fstrong> — invalid email, wrong password, etc. — surface as iron-oxide toasts (per §04b), not inline red text under the field.<\u002Fli>\n        <li>· <strong style=\"color:var(--fg);font-weight:500\">Empty pull-quote on tablet?<\u002Fstrong> The two-pane works to ~768px. Below that we collapse. Confirm Jen's tablet breakpoint matches.<\u002Fli>\n      <\u002Ful>\n      <p style=\"margin-top:18px;font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)\">→ Open for Jen's review.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- ============================================================\n     07 · ONBOARDING\n     ============================================================ -->\n<section id=\"onboarding\" data-screen-label=\"07 Onboarding\">\n  <div class=\"section-head\">\n    <h2>Set the tone <em>in the first three seconds<\u002Fem>.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>07<\u002Fb>Onboarding<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Addressing your two questions: where the wordmark sits, where the counter sits, whether linework helps.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"ob-sample\">\n    <div class=\"ob-side\">\n      <div class=\"kicker ink\">Before · current pattern<\u002Fdiv>\n      <h4>Wordmark left, counter right.<\u002Fh4>\n      <p class=\"annot\">Both float at the top of the same row. The counter (\"01 / 03\") competes with the wordmark for visual weight, and on narrow screens they collide. There's no rule between chrome and content, so the headline below feels like it's swimming.<\u002Fp>\n      <div class=\"kicker\">Issues to fix<\u002Fdiv>\n      <ul>\n        <li>Wordmark + counter compete for attention in the same row<\u002Fli>\n        <li>No visual divider between chrome and step content<\u002Fli>\n        <li>\"Get started\" CTA on Welcome is centered — orphan on a wide screen<\u002Fli>\n        <li>Steps share a layout but feel like different tools<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"ob-frame\" style=\"background:var(--bg)\">\n      <div class=\"ob-chrome\">\n        <span class=\"b\" style=\"font-family:var(--sans);font-weight:600;letter-spacing:-0.02em\">Good Measure<\u002Fspan>\n        <span class=\"c\"><b>01<\u002Fb> / 03<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"ob-eyebrow\">§ Your profile<\u002Fdiv>\n      <h1 class=\"ob-h\">Pick your <em>color<\u002Fem>.<\u002Fh1>\n      <p class=\"ob-lede\">Your color marks what's yours across the app — avatar, planner column, the accent on this page.<\u002Fp>\n      <div class=\"ob-name\">\n        <div class=\"label\" style=\"margin-bottom:6px\">Name<\u002Fdiv>\n        <input value=\"Dana\">\n      <\u002Fdiv>\n      <div class=\"ob-actions\">\n        <button class=\"ob-back\">← Back<\u002Fbutton>\n        <button class=\"ob-cta\">Continue <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- After / proposed -->\n  <div style=\"margin-top:48px;display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--rule);background:var(--bg)\">\n    <div class=\"ob-side\" style=\"border-right:1px solid var(--rule)\">\n      <div class=\"kicker ink\">After · proposed<\u002Fdiv>\n      <h4>Three changes.<\u002Fh4>\n      <p class=\"annot\">\n        <strong>1.<\u002Fstrong> Move counter to the top-right meta strip — out of the headline's path.<br><br>\n        <strong>2.<\u002Fstrong> Add a single full-width hairline rule between chrome and content. Earned by the brand, not decorative.<br><br>\n        <strong>3.<\u002Fstrong> Wordmark moves to <em>centered<\u002Fem> on Welcome &amp; Complete (bookend variant), <em>left<\u002Fem> on the three working steps. The shift signals: \"this is preamble\" vs \"this is the work.\"\n      <\u002Fp>\n      <div class=\"kicker\">Linework verdict<\u002Fdiv>\n      <p class=\"annot\">\n        Yes — but minimal. <strong style=\"color:var(--fg)\">One rule under the chrome, one above the actions, nothing else.<\u002Fstrong> Linework is the brand's connective tissue, not its decoration. Over-rule it and you'll lose the \"paper\" quality.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"ob-frame\">\n      <!-- new chrome — meta strip -->\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\">\n        <span class=\"kicker\">§ Onboarding · Apr 27, 2026<\u002Fspan>\n        <span class=\"kicker\"><b style=\"color:var(--fg);font-weight:500\">Step 02 / 03<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <!-- chrome rule -->\n      <div style=\"height:1px;background:var(--rule);margin-bottom:48px\"><\u002Fdiv>\n      <!-- centered wordmark on bookends — left-aligned here as it's the working step -->\n      <span class=\"b\" style=\"font-family:var(--sans);font-weight:600;font-size:18px;letter-spacing:-0.025em;display:block;margin-bottom:48px\">Good Measure<\u002Fspan>\n      <div class=\"ob-eyebrow\" style=\"margin-bottom:20px\">§ Your profile<\u002Fdiv>\n      <h1 class=\"ob-h\">Pick your <em>color<\u002Fem>.<\u002Fh1>\n      <p class=\"ob-lede\">Marks what's yours across the app — avatar, planner column, the accent on this page.<\u002Fp>\n      <div class=\"ob-name\">\n        <div class=\"label\" style=\"margin-bottom:6px\">Name<\u002Fdiv>\n        <input value=\"Dana\">\n      <\u002Fdiv>\n      <!-- person color picker preview -->\n      <div style=\"display:flex;gap:18px;margin-top:32px\">\n        <div style=\"width:32px;height:32px;border-radius:9999px;background:#5A9B6A;outline:2px solid var(--fg);outline-offset:3px\"><\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:9999px;background:#E84828\"><\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:9999px;background:#2B90C8\"><\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:9999px;background:#8B5A9E\"><\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:9999px;background:#5C7080\"><\u002Fdiv>\n        <div style=\"width:32px;height:32px;border-radius:9999px;background:#C45C3A\"><\u002Fdiv>\n      <\u002Fdiv>\n      <!-- actions rule -->\n      <div style=\"margin-top:auto;padding-top:32px\">\n        <div style=\"height:1px;background:var(--rule);margin-bottom:18px\"><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center\">\n          <button class=\"ob-back\">← Back<\u002Fbutton>\n          <button class=\"ob-cta\">Continue <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- bookend variant -->\n  <div style=\"margin-top:48px\">\n    <div class=\"kicker ink\" style=\"margin-bottom:18px\">Welcome &amp; Complete · bookend variant — wordmark centered, no counter<\u002Fdiv>\n    <div style=\"border:1px solid var(--rule);background:var(--bg);padding:64px 48px;text-align:center\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;text-align:left\">\n        <span class=\"kicker\">§ Onboarding · Welcome<\u002Fspan>\n        <span class=\"kicker\">v0.3<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:var(--rule);margin-bottom:64px\"><\u002Fdiv>\n      <span style=\"font-family:var(--sans);font-weight:600;font-size:32px;letter-spacing:-0.03em;display:inline-block;margin-bottom:64px\">Good Measure<\u002Fspan>\n      <div class=\"ob-eyebrow\" style=\"text-align:center;margin-bottom:24px\">§ Welcome<\u002Fdiv>\n      <h1 style=\"font-family:var(--sans);font-weight:500;font-size:64px;letter-spacing:-0.045em;line-height:1;max-width:14ch;margin:0 auto\">Measure what <em style=\"font-family:var(--serif-display);font-style:italic;font-weight:400\">matters<\u002Fem>.<\u002Fh1>\n      <p style=\"font-size:15px;line-height:1.65;color:var(--fg-2);margin-top:24px;max-width:44ch;margin-left:auto;margin-right:auto\">A nutrition tracker built around real recipes, real households, and the way you actually cook.<\u002Fp>\n      <button class=\"ob-cta\" style=\"margin-top:48px\">Get started <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     08 · STATES\n     ============================================================ -->\n<section id=\"states\" data-screen-label=\"08 States\">\n  <div class=\"section-head\">\n    <h2>Empty, loading, error — <em>still on brand<\u002Fem>.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>08<\u002Fb>States<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">No illustrations. No mascots. The void carries the voice.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"state-grid\">\n\n    <!-- Empty -->\n    <div class=\"state-cell\">\n      <div class=\"kicker\">§ Empty · Recipes<\u002Fdiv>\n      <div class=\"stage\" style=\"text-align:left;align-items:flex-start\">\n        <h4 style=\"font-family:var(--sans);font-weight:500;font-size:24px;letter-spacing:-0.02em\">No recipes <em style=\"font-family:var(--serif-display);font-style:italic;font-weight:400\">yet<\u002Fem>.<\u002Fh4>\n        <p>Drop a URL, paste a list of ingredients, or start from scratch — Good Measure handles the math.<\u002Fp>\n        <div style=\"display:flex;gap:10px;margin-top:14px\"><button class=\"ed-btn primary\">Add recipe<\u002Fbutton><button class=\"ed-btn\">Import URL<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footnote\">No glyph · type carries it · helpful copy + clear next action<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Loading -->\n    <div class=\"state-cell\">\n      <div class=\"kicker\">§ Loading · Pantry<\u002Fdiv>\n      <div class=\"stage\" style=\"align-items:stretch;text-align:left\">\n        <div style=\"width:100%\">\n          <div class=\"skel\" style=\"width:60%\"><\u002Fdiv>\n          <div class=\"skel\" style=\"width:90%\"><\u002Fdiv>\n          <div class=\"skel\" style=\"width:75%\"><\u002Fdiv>\n          <div class=\"skel\" style=\"width:50%;margin-top:18px\"><\u002Fdiv>\n          <div class=\"skel\" style=\"width:85%\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footnote\">Hairline shimmer · matches type sizes · no spinner<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Error -->\n    <div class=\"state-cell\">\n      <div class=\"kicker\">§ Error · Sync<\u002Fdiv>\n      <div class=\"stage\" style=\"text-align:left;align-items:flex-start\">\n        <span style=\"background:#F0DCD6;color:#A33A28;padding:5px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px\"><span style=\"width:6px;height:6px;border-radius:9999px;background:#A33A28\"><\u002Fspan>Sync error<\u002Fspan>\n        <h4 style=\"font-family:var(--sans);font-weight:500;font-size:24px;letter-spacing:-0.02em;margin-top:8px\">Couldn't reach the <em style=\"font-family:var(--serif-display);font-style:italic;font-weight:400\">kitchen<\u002Fem>.<\u002Fh4>\n        <p>Your changes are saved locally. We'll sync when you're back online — nothing's lost.<\u002Fp>\n        <div style=\"display:flex;gap:10px;margin-top:14px\"><button class=\"ed-btn\">Try again<\u002Fbutton><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"footnote\">Status pill in lieu of icon · plain language about what we did<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     FOOT\n     ============================================================ -->\n<div class=\"foot\">\n  <div><b>Good Measure<\u002Fb> · Design system v0.3 — internal review draft<\u002Fdiv>\n  <div style=\"text-align:right\">04 / 27 / 2026 — <b>set 03 / 03<\u002Fb><\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n// Replay motion demos on hover — re-trigger animation by toggling class\ndocument.querySelectorAll('[data-replay]').forEach(stage => {\n  stage.addEventListener('mouseenter', () => {\n    stage.classList.remove('replay-on');\n    void stage.offsetWidth; // force reflow\n    stage.classList.add('replay-on');\n  });\n});\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
