  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}\n.mono{font-family:var(--mono)}\n\n/* ─── MASTHEAD ─── */\n.masthead{\n  border-bottom:1px solid var(--rule);\n  padding:18px var(--pad);\n  display:flex;justify-content:space-between;align-items:center;\n  background:var(--bg);position:sticky;top:0;z-index:50;\n}\n.masthead-left{display:flex;align-items:baseline;gap:18px}\n.masthead-title{font-weight:600;font-size:13px;letter-spacing:-0.02em}\n.masthead-meta{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);display:flex;gap:24px}\n.masthead-meta b{color:var(--fg);font-weight:500}\n\n/* ─── TOC ─── */\n.toc{display:flex;flex-wrap:wrap;gap:0;border-bottom:1px solid var(--rule);padding:0 var(--pad);background:var(--bg)}\n.toc a{\n  font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;\n  color:var(--muted);text-decoration:none;padding:14px 0;margin-right:32px;\n  border-bottom:1px solid transparent;transition:color .2s, border-color .2s;\n}\n.toc a:hover{color:var(--fg)}\n.toc a b{color:var(--fg);font-weight:500;margin-right:8px}\n\n/* ─── FRONT MATTER ─── */\n.front{padding:96px var(--pad) 96px;border-bottom:1px solid var(--rule)}\n.front-meta{\n  display:grid;grid-template-columns:repeat(4,1fr);gap:24px;\n  font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);\n  margin-bottom:80px;padding-bottom:36px;border-bottom:1px solid var(--rule);\n}\n.front-meta b{color:var(--fg);font-weight:500;display:block;margin-bottom:6px}\n.front-headline{\n  display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:end;\n}\n.front h1{\n  font-size:clamp(64px,9vw,128px);font-weight:500;letter-spacing:-0.045em;line-height:0.92;\n}\n.front h1 em{font-style:italic;font-family:var(--serif-display);font-weight:400}\n.front-lede{font-size:17px;line-height:1.65;color:var(--fg-2);max-width:46ch}\n.front-lede strong{color:var(--fg);font-weight:500}\n\n/* ─── SECTION SHELL ─── */\nsection{padding:96px var(--pad);border-bottom:1px solid var(--rule);position:relative;scroll-margin-top:60px}\n.section-head{\n  display:grid;grid-template-columns:1fr auto;gap:24px;align-items:baseline;margin-bottom:64px;\n}\n.section-head .num{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted)}\n.section-head .num b{color:var(--fg);font-weight:500;margin-right:14px}\n.section-head h2{font-size:clamp(36px,4.5vw,56px);font-weight:500;letter-spacing:-0.03em;line-height:1.02;max-width:20ch;grid-column:1;}\n.section-head h2 em{font-style:italic;font-family:var(--serif-display);font-weight:400}\n.section-head .meta{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);text-align:right;align-self:start;justify-self:end;max-width:32ch}\n\n/* ─── REUSABLE GRID ─── */\n.gx{display:grid;border-top:1px solid var(--rule);border-left:1px solid var(--rule)}\n.gx > .cell{border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:32px;background:var(--bg);min-height:200px}\n.gx-2{grid-template-columns:repeat(2,1fr)}\n.gx-3{grid-template-columns:repeat(3,1fr)}\n.gx-4{grid-template-columns:repeat(4,1fr)}\n.cell h3{font-size:16px;font-weight:600;letter-spacing:-0.01em;margin-bottom:8px}\n.cell .desc{font-size:13.5px;color:var(--fg-2);line-height:1.6}\n\n/* ============================================================\n   01 · WORDMARK\n   ============================================================ */\n.wm-grid{display:grid;grid-template-columns:1fr;border-top:1px solid var(--rule)}\n.wm-row{\n  display:grid;grid-template-columns:140px 1fr 280px;\n  border-bottom:1px solid var(--rule);\n  align-items:stretch;\n}\n.wm-row > .label-col{\n  padding:36px 24px;border-right:1px solid var(--rule);background:var(--bg-2);\n  display:flex;flex-direction:column;gap:6px;\n}\n.wm-row > .label-col .num{font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg);font-weight:500}\n.wm-row > .label-col .name{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:auto}\n.wm-row > .stage{\n  padding:64px 48px;display:flex;align-items:center;justify-content:center;\n  background:var(--bg);min-height:240px;\n}\n.wm-row > .notes{\n  padding:32px 28px;border-left:1px solid var(--rule);background:var(--bg);\n  display:flex;flex-direction:column;gap:14px;\n}\n.wm-row > .notes h4{font-size:15px;font-weight:600;letter-spacing:-0.01em}\n.wm-row > .notes p{font-size:13px;line-height:1.6;color:var(--fg-2)}\n.wm-row > .notes .specs{font-family:var(--mono);font-size:9.5px;letter-spacing:0.06em;color:var(--muted);line-height:1.7;margin-top:auto;padding-top:14px;border-top:1px solid var(--rule)}\n\n/* — wordmark visual variants — */\n.wm-1{font-family:var(--serif);font-weight:500;font-size:88px;letter-spacing:-0.04em;line-height:0.95;font-variation-settings:'opsz' 144,'SOFT' 0;color:var(--fg)}\n.wm-1 em{font-style:italic;font-weight:500}\n\n.wm-2{font-family:var(--serif-display);font-weight:400;font-size:96px;letter-spacing:-0.02em;line-height:0.95;color:var(--fg);text-transform:none}\n.wm-2 .amp{font-style:italic}\n\n.wm-3{font-family:var(--sans);font-weight:500;font-size:80px;letter-spacing:-0.035em;line-height:0.92;color:var(--fg);text-transform:lowercase}\n.wm-3 .dot{display:inline-block;width:9px;height:9px;background:var(--fg);border-radius:9999px;margin:0 10px 14px;vertical-align:middle}\n\n.wm-4{font-family:var(--sans);font-weight:600;font-size:80px;letter-spacing:-0.045em;line-height:0.95;color:var(--fg);position:relative;display:inline-block}\n.wm-4 .swash{font-family:var(--serif-display);font-style:italic;font-weight:400;font-size:1.04em;letter-spacing:-0.02em}\n\n.wm-5{font-family:var(--mono);font-weight:500;font-size:48px;letter-spacing:-0.04em;line-height:1;color:var(--fg);text-transform:uppercase;display:inline-flex;align-items:baseline;gap:0.18em}\n.wm-5 .b{display:inline-block;border-top:2px solid var(--fg);padding-top:6px}\n\n/* — wordmark size scale demo — */\n.wm-scale{display:flex;flex-direction:column;gap:18px;border-top:1px solid var(--rule);padding-top:36px;margin-top:64px}\n.wm-scale-row{display:flex;align-items:baseline;justify-content:space-between;gap:24px;border-bottom:1px solid var(--rule);padding:18px 0}\n.wm-scale-row .lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);min-width:120px}\n.wm-scale-row .val{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em}\n\n/* ============================================================\n   02 · COLOR\n   ============================================================ */\n.swatches{display:grid;grid-template-columns:repeat(6,1fr);border-top:1px solid var(--rule);border-left:1px solid var(--rule)}\n.swatch{\n  border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);\n  padding:18px 16px 22px;display:flex;flex-direction:column;gap:6px;min-height:180px;background:var(--bg);\n}\n.swatch .chip{height:64px;border:1px solid var(--rule-faint);margin-bottom:14px}\n.swatch .name{font-size:13px;font-weight:600;letter-spacing:-0.01em}\n.swatch .hex{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em}\n.swatch .role{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px}\n.brand-only{margin-top:48px;padding:48px;border:1px solid var(--rule);background:var(--bg);text-align:center}\n.brand-only .h{font-family:var(--serif-display);font-style:italic;font-size:48px;letter-spacing:-0.02em;line-height:1.05;font-weight:400}\n.brand-only .p{margin-top:18px;font-size:14.5px;line-height:1.6;color:var(--fg-2);max-width:52ch;margin-left:auto;margin-right:auto}\n\n/* ============================================================\n   03 · TYPE\n   ============================================================ */\n.type-grid{display:grid;grid-template-columns:140px 1fr 220px;gap:0;border-top:1px solid var(--rule)}\n.type-row{display:contents}\n.type-row > div{border-bottom:1px solid var(--rule);padding:24px 20px;display:flex;align-items:baseline}\n.type-row > div:first-child{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);align-items:flex-start;padding-top:32px;background:var(--bg-2)}\n.type-row > div:nth-child(2){padding-left:32px;padding-right:32px;background:var(--bg)}\n.type-row > div:nth-child(3){font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;align-items:flex-end;padding-top:32px;text-align:right;justify-content:flex-end;flex-direction:column;gap:4px;background:var(--bg-2)}\n.type-hero{font-family:var(--sans);font-weight:500;font-size:128px;letter-spacing:-0.018em;line-height:1.0;color:var(--fg)}\n.type-hero em{font-family:var(--sans);font-style:normal;font-weight:500;color:#E84828}\n.type-display{font-family:var(--sans);font-weight:500;font-size:64px;letter-spacing:-0.04em;line-height:0.95;color:var(--fg)}\n.type-display em{font-family:var(--serif-display);font-style:italic;font-weight:400}\n.type-h1{font-family:var(--sans);font-weight:600;font-size:40px;letter-spacing:-0.03em;line-height:1.05}\n.type-h2{font-family:var(--sans);font-weight:600;font-size:24px;letter-spacing:-0.015em;line-height:1.15}\n.type-eyebrow{font-family:var(--sans);font-weight:500;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}\n.type-eyebrow.ink{color:var(--fg)}\n.type-body{font-family:var(--sans);font-weight:400;font-size:14px;line-height:1.55;color:var(--fg-2);max-width:48ch}\n.type-body em{font-family:var(--serif-display);font-style:italic;color:var(--fg);font-size:1.05em}\n.type-meta{font-family:var(--mono);font-weight:400;font-size:11px;letter-spacing:0.04em;color:var(--fg)}\n.type-meta .u{font-size:9px;color:var(--muted);margin-left:2px}\n.type-tabnum{font-family:var(--mono);font-size:18px;letter-spacing:0.02em;font-variant-numeric:tabular-nums}\n\n/* ============================================================\n   04 · COMPONENTS (compact rerun)\n   ============================================================ */\n.ed-btn{font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;padding:9px 22px;cursor:pointer;border:1px solid var(--rule);border-radius:0;background:none;color:var(--fg);transition:all .15s var(--ease);white-space:nowrap}\n.ed-btn:hover{border-color:var(--fg)}\n.ed-btn.primary{background:var(--fg);color:var(--bg);border-color:var(--fg)}\n.ed-btn.ghost{border-color:transparent;color:var(--muted);padding-left:0;padding-right:0;text-decoration:underline;text-decoration-color:transparent;text-underline-offset:6px;transition:all .15s var(--ease)}\n.ed-btn.ghost:hover{color:var(--fg);text-decoration-color:var(--fg)}\n.ed-chip{font-family:var(--sans);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);background:none;border:0;padding:3px 0 4px;border-bottom:1.5px solid transparent;cursor:pointer;transition:all .15s var(--ease)}\n.ed-chip:hover{color:var(--fg)}\n.ed-chip.is-active{color:var(--fg);border-bottom-color:var(--fg)}\n.ed-input{font-family:var(--sans);font-size:14px;color:var(--fg);background:transparent;border:none;border-bottom:1px solid var(--rule);padding:8px 0;width:100%;outline:none;transition:border-color .2s}\n.ed-input:focus{border-color:var(--fg)}\n.ed-input::placeholder{color:var(--muted)}\n\n/* ============================================================\n   05 · MOTION\n   ============================================================ */\n.motion-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0;border-top:1px solid var(--rule);border-left:1px solid var(--rule)}\n.motion-cell{\n  border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);\n  padding:32px;background:var(--bg);\n  display:flex;flex-direction:column;gap:18px;min-height:280px;\n}\n.motion-head{display:flex;justify-content:space-between;align-items:baseline}\n.motion-name{font-size:16px;font-weight:600;letter-spacing:-0.01em}\n.motion-id{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}\n.motion-stage{\n  flex:1;display:flex;align-items:center;justify-content:center;\n  background:var(--bg-2);border:1px solid var(--rule);padding:32px;\n  position:relative;overflow:hidden;cursor:pointer;\n}\n.motion-stage .play-hint{\n  position:absolute;top:10px;right:12px;\n  font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;\n}\n.motion-spec{font-family:var(--mono);font-size:10.5px;color:var(--fg-2);line-height:1.7;background:var(--bg-2);padding:14px 16px;border-left:2px solid var(--fg)}\n.motion-spec b{color:var(--fg);font-weight:500;text-transform:uppercase;letter-spacing:0.1em;font-size:9.5px;display:block;margin-bottom:6px}\n\n/* motion demo elements */\n@keyframes m-fade{0%{opacity:0}100%{opacity:1}}\n@keyframes m-rise{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:none}}\n@keyframes m-rule{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}\n@keyframes m-press{0%,100%{transform:scale(1)}50%{transform:scale(0.97)}}\n@keyframes m-page{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:none}}\n@keyframes m-sheet{0%{transform:translateY(100%)}100%{transform:translateY(0)}}\n@keyframes m-counter{0%{opacity:0;transform:translateY(-4px)}100%{opacity:1;transform:none}}\n\n.motion-stage.replay-on .demo-fade{animation:m-fade 280ms var(--ease) both}\n.motion-stage.replay-on .demo-rise{animation:m-rise 360ms var(--ease) both}\n.motion-stage.replay-on .demo-rule{animation:m-rule 320ms var(--ease) both;transform-origin:left}\n.motion-stage.replay-on .demo-press{animation:m-press 280ms var(--ease) both}\n.motion-stage.replay-on .demo-page{animation:m-page 420ms var(--ease) both}\n.motion-stage.replay-on .demo-sheet{animation:m-sheet 360ms var(--ease) both}\n.motion-stage.replay-on .demo-counter{animation:m-counter 240ms var(--ease) both}\n\n.demo-card{background:var(--bg);border:1px solid var(--rule);padding:18px 22px;width:200px}\n.demo-card .l{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}\n.demo-card .v{font-family:var(--mono);font-size:24px;margin-top:4px;letter-spacing:-0.02em}\n.demo-rule-line{width:200px;height:2px;background:var(--fg)}\n.demo-btn{padding:10px 22px;border:1px solid var(--fg);background:var(--fg);color:var(--bg);font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase}\n.demo-page-card{background:var(--bg);border:1px solid var(--rule);padding:24px;width:240px}\n.demo-page-card h4{font-size:18px;font-weight:600;letter-spacing:-0.015em}\n.demo-page-card p{font-size:12px;color:var(--muted);margin-top:6px}\n.demo-sheet-frame{position:absolute;left:0;right:0;bottom:0;height:60%;background:var(--bg);border-top:1px solid var(--rule);padding:24px;display:flex;flex-direction:column;gap:8px}\n.demo-sheet-handle{width:40px;height:4px;background:var(--rule);margin:0 auto 12px}\n.demo-counter-num{font-family:var(--mono);font-size:36px;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;color:var(--fg)}\n\n/* ============================================================\n   06 · MODALS\n   ============================================================ */\n.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--rule);border-left:1px solid var(--rule)}\n.modal-frame{\n  border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);\n  padding:36px;background:var(--bg-2);\n}\n.modal-frame .m-lbl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px}\n.modal-frame .m-lbl .name{font-size:15px;font-weight:600;letter-spacing:-0.01em}\n.modal-frame .m-lbl .id{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}\n\n/* sheet */\n.viewport-mock{\n  position:relative;width:100%;height:420px;background:var(--fg);overflow:hidden;\n}\n.viewport-mock .scrim{position:absolute;inset:0;background:rgba(26,25,22,0.55)}\n.sheet{\n  position:absolute;left:0;right:0;bottom:0;background:var(--bg);\n  padding:28px 28px 36px;display:flex;flex-direction:column;gap:16px;max-height:80%;\n}\n.sheet .handle{width:36px;height:3px;background:var(--rule);margin:0 auto 12px;border-radius:0}\n.sheet h4{font-size:22px;font-weight:600;letter-spacing:-0.02em}\n.sheet .lbl{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-top:4px}\n.sheet .field{display:flex;flex-direction:column;gap:6px;margin-top:8px}\n.sheet .field input{font-family:var(--sans);font-size:14px;border:none;border-bottom:1px solid var(--rule);padding:8px 0;background:transparent;outline:none}\n.sheet .actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:18px;border-top:1px solid var(--rule)}\n.sheet .actions .left{display:flex;gap:12px}\n\n/* centered confirm */\n.confirm{\n  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);\n  background:var(--bg);border:1px solid var(--fg);width:80%;max-width:380px;\n  padding:32px;display:flex;flex-direction:column;gap:14px;\n}\n.confirm .e{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--err)}\n.confirm h4{font-size:22px;font-weight:600;letter-spacing:-0.02em;line-height:1.15}\n.confirm h4 em{font-family:var(--serif-display);font-style:italic;font-weight:400}\n.confirm p{font-size:13px;color:var(--fg-2);line-height:1.6}\n.confirm .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}\n.confirm .destr{background:var(--err);color:#fff;border-color:var(--err)}\n\n/* command palette */\n.command{\n  position:absolute;left:50%;top:32%;transform:translate(-50%,-50%);\n  background:var(--bg);border:1px solid var(--rule);width:90%;max-width:480px;\n  display:flex;flex-direction:column;\n}\n.command .search{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--rule)}\n.command .search .glyph{font-family:var(--mono);color:var(--muted);font-size:11px}\n.command .search input{flex:1;border:0;outline:0;font-family:var(--sans);font-size:14px;background:transparent;color:var(--fg)}\n.command .results{padding:6px 0}\n.command .row{display:flex;align-items:baseline;justify-content:space-between;padding:9px 20px;font-size:13px}\n.command .row.sel{background:var(--bg-3)}\n.command .row .key{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase}\n\n/* toast */\n.toast-stage{position:relative;width:100%;height:200px;background:var(--bg-2);overflow:hidden;border:1px solid var(--rule)}\n.toast{\n  position:absolute;left:50%;bottom:24px;transform:translateX(-50%);\n  background:var(--fg);color:var(--bg);padding:14px 22px;\n  font-family:var(--mono);font-size:11px;letter-spacing:0.06em;\n  display:flex;align-items:center;gap:14px;\n}\n.toast b{font-family:var(--sans);font-weight:500;letter-spacing:0;text-transform:none}\n.toast .undo{font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;background:transparent;color:var(--bg);border:1px solid rgba(245,244,239,0.4);padding:5px 10px;cursor:pointer}\n\n/* ============================================================\n   07 · MOBILE\n   ============================================================ */\n.mobile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;align-items:start}\n.phone{\n  width:100%;max-width:360px;margin:0 auto;\n  background:var(--bg);border:1px solid var(--fg);border-radius:36px;overflow:hidden;\n  position:relative;aspect-ratio:9/19;\n}\n.phone .status{\n  height:36px;display:flex;justify-content:space-between;align-items:center;\n  padding:0 28px;font-family:var(--sans);font-size:11px;font-weight:600;color:var(--fg);\n}\n.phone .status .dots{display:flex;gap:3px}\n.phone .status .dots span{width:4px;height:4px;border-radius:9999px;background:var(--fg)}\n.phone > .body{padding:0 20px;height:calc(100% - 36px - 64px);overflow:hidden;display:flex;flex-direction:column}\n.phone .topbar{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0 16px;border-bottom:1px solid var(--rule);margin-bottom:18px}\n.phone .topbar .b{font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:-0.02em}\n.phone .topbar .m{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase}\n\n/* — Mobile Nav Pattern A — bottom tab (current) */\n.nav-tab{\n  position:absolute;left:0;right:0;bottom:0;height:64px;\n  border-top:1px solid var(--rule);\n  display:grid;grid-template-columns:repeat(4,1fr);\n  background:var(--bg);align-items:center;\n}\n.nav-tab .t{position:relative;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);height:100%;cursor:pointer}\n.nav-tab .t.on{color:var(--fg)}\n.nav-tab .t .lbl{padding:6px 0 4px;border-bottom:1.5px solid transparent}\n.nav-tab .t.on .lbl{border-bottom-color:var(--fg)}\n\n/* — Pattern B — editorial top bar + section index */\n.nav-bar-top{\n  position:absolute;left:0;right:0;bottom:0;height:60px;\n  border-top:1px solid var(--rule);\n  display:flex;justify-content:space-between;align-items:center;\n  padding:0 24px;background:var(--bg);\n}\n.nav-bar-top .menu{font-family:var(--mono);font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--fg);display:flex;align-items:center;gap:10px}\n.nav-bar-top .menu .lines{display:inline-flex;flex-direction:column;gap:3px}\n.nav-bar-top .menu .lines span{width:14px;height:1.5px;background:var(--fg)}\n.nav-bar-top .index{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase}\n.nav-bar-top .index b{color:var(--fg);font-weight:500}\n\n/* — Pattern C — segmented compass (pill nav at bottom) */\n.nav-pill{\n  position:absolute;left:50%;bottom:24px;transform:translateX(-50%);\n  display:flex;gap:0;background:var(--fg);color:var(--bg);\n  padding:8px 12px;align-items:center;\n}\n.nav-pill .t{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;padding:6px 12px;color:rgba(245,244,239,0.5);border-right:1px solid rgba(245,244,239,0.15)}\n.nav-pill .t:last-child{border-right:0}\n.nav-pill .t.on{color:#fff}\n\n.mobile-meta{margin-top:18px;padding:16px 20px;background:var(--bg-2);border:1px solid var(--rule)}\n.mobile-meta .name{font-size:14px;font-weight:600;letter-spacing:-0.01em}\n.mobile-meta .num{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase}\n.mobile-meta .desc{font-size:12.5px;line-height:1.55;color:var(--fg-2);margin-top:8px}\n.mobile-meta .verdict{font-family:var(--mono);font-size:10px;letter-spacing:0.06em;color:var(--fg);margin-top:10px;padding-top:10px;border-top:1px solid var(--rule)}\n.mobile-meta .verdict .pro{color:var(--ok)}\n.mobile-meta .verdict .con{color:var(--err)}\n\n/* mobile body content (recipe list) */\n.m-list-row{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--rule)}\n.m-list-row .thumb{width:54px;height:54px;background:var(--bg-3);flex-shrink:0;background:repeating-linear-gradient(135deg,var(--bg-2) 0 8px,var(--bg-3) 8px 9px)}\n.m-list-row .body{flex:1;display:flex;flex-direction:column;gap:2px;justify-content:center}\n.m-list-row .cat{font-family:var(--mono);font-size:8.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}\n.m-list-row .name{font-family:var(--sans);font-weight:600;font-size:13px;letter-spacing:-0.01em}\n\n/* ============================================================\n   08 · ONBOARDING\n   ============================================================ */\n.ob-sample{\n  display:grid;grid-template-columns:1fr 1fr;gap:0;\n  border:1px solid var(--rule);background:var(--bg);\n}\n.ob-side{padding:28px;background:var(--bg-2);border-right:1px solid var(--rule);display:flex;flex-direction:column;gap:18px}\n.ob-side h4{font-size:16px;font-weight:600;letter-spacing:-0.01em}\n.ob-side .annot{font-size:13px;color:var(--fg-2);line-height:1.6}\n.ob-side .label{margin-top:8px}\n.ob-side ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px;font-size:13px;color:var(--fg-2)}\n.ob-side ul li{padding-left:20px;position:relative;line-height:1.55}\n.ob-side ul li::before{content:'→';position:absolute;left:0;top:0;color:var(--fg);font-family:var(--mono);font-size:11px}\n.ob-frame{padding:48px 36px;display:flex;flex-direction:column;min-height:480px;position:relative}\n.ob-chrome{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:28px;border-bottom:1px solid var(--rule);margin-bottom:48px}\n.ob-chrome .b{font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:-0.02em}\n.ob-chrome .c{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase}\n.ob-chrome .c b{color:var(--fg);font-weight:500}\n.ob-eyebrow{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:18px}\n.ob-h{font-family:var(--sans);font-weight:500;font-size:36px;letter-spacing:-0.03em;line-height:1.05;max-width:14ch}\n.ob-h em{font-family:var(--serif-display);font-style:italic;font-weight:400}\n.ob-lede{font-size:13.5px;line-height:1.65;color:var(--fg-2);margin-top:14px;max-width:36ch}\n.ob-name{margin-top:28px}\n.ob-name input{font-family:var(--sans);font-size:14px;border:none;border-bottom:1px solid var(--rule);padding:8px 0;background:transparent;outline:none;width:100%;max-width:280px}\n.ob-actions{margin-top:auto;padding-top:32px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--rule)}\n.ob-cta{padding:12px 26px;background:var(--fg);color:var(--bg);font-family:var(--sans);font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:14px}\n.ob-cta .arr{font-family:var(--mono);font-size:11px}\n.ob-back{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;background:transparent;border:0;cursor:pointer}\n\n/* ============================================================\n   09 · STATES\n   ============================================================ */\n.state-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--rule);border-left:1px solid var(--rule)}\n.state-cell{\n  border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);\n  padding:48px 32px;background:var(--bg);\n  min-height:300px;display:flex;flex-direction:column;justify-content:space-between;gap:18px;\n}\n.state-cell .stage{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;flex-direction:column;gap:14px;padding:24px}\n.state-cell .stage .glyph{font-family:var(--serif-display);font-style:italic;font-size:48px;color:var(--muted);line-height:1}\n.state-cell .stage h4{font-size:18px;font-weight:600;letter-spacing:-0.015em;margin-top:8px}\n.state-cell .stage p{font-size:13px;color:var(--fg-2);line-height:1.55;max-width:32ch}\n.state-cell .footnote{font-family:var(--mono);font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);text-align:center;padding-top:14px;border-top:1px solid var(--rule)}\n\n/* loading skeleton */\n@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}\n.skel{height:14px;background:linear-gradient(90deg, var(--bg-2) 0%, var(--bg-3) 50%, var(--bg-2) 100%);background-size:200% 100%;animation:shimmer 1.6s linear infinite;margin-bottom:8px}\n\n/* ============================================================\n   FOOT\n   ============================================================ */\n.foot{padding:64px var(--pad) 80px;display:grid;grid-template-columns:1fr 1fr;gap:24px;font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}\n.foot b{color:var(--fg);font-weight:500}\n\n/* responsive */\n@media (max-width: 1100px){\n  .swatches{grid-template-columns:repeat(3,1fr)}\n  .gx-3, .gx-4, .motion-grid, .modal-grid, .state-grid, .mobile-grid{grid-template-columns:repeat(2,1fr)}\n  .front-headline{grid-template-columns:1fr;gap:32px}\n  .front-meta{grid-template-columns:repeat(2,1fr)}\n  .wm-row{grid-template-columns:120px 1fr}\n  .wm-row > .notes{grid-column:1 / -1;border-left:0;border-top:1px solid var(--rule)}\n  .ob-sample{grid-template-columns:1fr}\n  .ob-side{border-right:0;border-bottom:1px solid var(--rule)}\n}\n@media (max-width: 720px){\n  .swatches, .gx-2, .gx-3, .gx-4, .motion-grid, .modal-grid, .state-grid, .mobile-grid{grid-template-columns:1fr}\n  .type-grid{grid-template-columns:1fr}\n  .type-row > div:first-child, .type-row > div:nth-child(3){text-align:left;align-items:flex-start;padding-top:14px;padding-bottom:0}\n  .type-row > div:nth-child(2){padding:8px 20px 20px}\n  .wm-row{grid-template-columns:1fr}\n  .wm-row > .label-col{border-right:0;border-bottom:1px solid var(--rule)}\n  .toc{flex-direction:column;gap:0}\n  .toc a{margin-right:0}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ============================================================\n     MASTHEAD + TOC\n     ============================================================ -->\n<header class=\"masthead\" data-screen-label=\"Masthead\">\n  <div class=\"masthead-left\">\n    <span class=\"masthead-title\" style=\"font-family:var(--sans);font-weight:600;font-size:14px;letter-spacing:-0.02em\">Good Measure<\u002Fspan>\n    <span class=\"kicker\">§ Design System v0.3 — internal review<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"masthead-meta\">\n    <span><b>04 / 27 / 2026<\u002Fb><\u002Fspan>\n    <span>Set 03 / 03<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<nav class=\"toc\" aria-label=\"Sections\">\n  <a href=\"#how\"><b>00<\u002Fb>How to use<\u002Fa>\n  <a href=\"#color\"><b>01<\u002Fb>Color<\u002Fa>\n  <a href=\"#dot\"><b>01b<\u002Fb>Dot<\u002Fa>\n  <a href=\"#type\"><b>02<\u002Fb>Type<\u002Fa>\n  <a href=\"#components\"><b>03<\u002Fb>Components<\u002Fa>\n  <a href=\"#status\"><b>03b<\u002Fb>Status<\u002Fa>\n  <a href=\"#motion\"><b>04<\u002Fb>Motion<\u002Fa>\n  <a href=\"#modals\"><b>05<\u002Fb>Modals<\u002Fa>\n  <a href=\"#mobile\"><b>06<\u002Fb>Mobile<\u002Fa>\n  <a href=\"#auth\"><b>07a<\u002Fb>Auth<\u002Fa>\n  <a href=\"#onboarding\"><b>07<\u002Fb>Onboarding<\u002Fa>\n  <a href=\"#states\"><b>08<\u002Fb>States<\u002Fa>\n<\u002Fnav>\n\n<!-- ============================================================\n     FRONT MATTER\n     ============================================================ -->\n<div class=\"front\" data-screen-label=\"00 Front matter\">\n  <div class=\"front-meta\">\n    <div><b>Document<\u002Fb>System tightening — v3<\u002Fdiv>\n    <div><b>Scope<\u002Fb>Tokens · Components · Patterns<\u002Fdiv>\n    <div><b>Not in scope<\u002Fb>Wordmark <span style=\"color:var(--muted)\">(separate doc)<\u002Fspan><\u002Fdiv>\n    <div><b>Posture<\u002Fb>Codify what's there. Don't redesign.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"front-headline\">\n    <h1>Tighten the system. <em>Leave the pages alone.<\u002Fem><\u002Fh1>\n    <p class=\"front-lede\">\n      The landing page, dashboard, planner, and recipe detail are mostly working. This\n      document <strong>codifies the patterns already in those pages<\u002Fstrong> so they stop\n      drifting — and proposes <strong>narrow, specific changes<\u002Fstrong> where the system\n      isn't yet consistent (status colors, modal chrome, mobile parity, onboarding rhythm).\n      It is not a redesign brief.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============================================================\n     00 · HOW TO USE THIS DOC\n     ============================================================ -->\n<section id=\"how\" data-screen-label=\"00 How to use\">\n  <div class=\"section-head\">\n    <h2>How to use this <em>document<\u002Fem>.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>00<\u002Fb>How to use<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">For Jen, contributors, and any code agent (incl. Claude Code) reading this as a spec.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:36px;padding:24px 28px;background:var(--bg);border:1px solid var(--fg);display:grid;grid-template-columns:1fr 2fr;gap:28px;align-items:start\">\n    <div class=\"kicker ink\" style=\"color:var(--fg)\">⚠ Spec ≠ product<\u002Fdiv>\n    <div style=\"font-size:13.5px;line-height:1.65;color:var(--fg-2)\">\n      <strong style=\"color:var(--fg);font-weight:500\">The type sizes used in this document's own layout are not sanctioned product values.<\u002Fstrong> The spec uses sizes like 12, 15, 17, 18, 22px to typeset itself as a readable editorial document. The <strong style=\"color:var(--fg);font-weight:500\">only sanctioned product type scale is §02 · Type<\u002Fstrong>: 9 · 11 · 13 · 16 · 20 · 28 · 36 · 48 · 64 · 80 · 96 · 128px. If a value isn't on that ladder, don't ship it. When in doubt, round to the nearest scale step.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule)\">\n    <div style=\"padding:36px 36px 36px 0;border-right:1px solid var(--rule)\">\n      <div class=\"kicker ink\">✓ Do<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:18px 0 0;display:flex;flex-direction:column;gap:14px;font-size:14px;line-height:1.6;color:var(--fg-2)\">\n        <li><strong style=\"color:var(--fg);font-weight:500\">Treat this as a token + component reference.<\u002Fstrong> Pull color, type, spacing, and component shells into your stylesheet/components. The page-level layouts in the live app stay as they are.<\u002Fli>\n        <li><strong style=\"color:var(--fg);font-weight:500\">Replace component <em>internals<\u002Fem> to match.<\u002Fstrong> If a button, chip, or stat-cell in the live app diverges from §03, swap it to match. The surrounding page composition does not change.<\u002Fli>\n        <li><strong style=\"color:var(--fg);font-weight:500\">Adopt the new status palette (§03b) wholesale.<\u002Fstrong> Saturated reds &amp; greens out, warm iron-oxide / olive in. Pills replace stacked banner rows.<\u002Fli>\n        <li><strong style=\"color:var(--fg);font-weight:500\">Ask before adding new pages or sections.<\u002Fstrong> The doc is silent on anything not pictured — that means leave it alone.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"padding:36px 0 36px 36px\">\n      <div class=\"kicker\" style=\"color:var(--status-red)\">✗ Don't<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:18px 0 0;display:flex;flex-direction:column;gap:14px;font-size:14px;line-height:1.6;color:var(--fg-2)\">\n        <li><strong style=\"color:var(--fg);font-weight:500\">Don't redesign the landing page, dashboard, planner, or recipe detail.<\u002Fstrong> They're the editorial spine of the product. Their layouts are working. Only swap tokens / component internals.<\u002Fli>\n        <li><strong style=\"color:var(--fg);font-weight:500\">Don't change the wordmark from this doc.<\u002Fstrong> Wordmark direction lives in <em>Good Measure Wordmark Exploration<\u002Fem> and is still in flight. Until it lands, the live upright sans \"Good Measure\" stays.<\u002Fli>\n        <li><strong style=\"color:var(--fg);font-weight:500\">Don't introduce new colors.<\u002Fstrong> Six person themes (§01) + three status hues (§03b) + paper/ink/rule. That's the whole palette.<\u002Fli>\n        <li><strong style=\"color:var(--fg);font-weight:500\">Don't add iconography or illustration.<\u002Fstrong> The system is type-led. Empty &amp; error states (§08) are intentionally glyph-free.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:36px;padding:32px;background:var(--bg-2);border:1px solid var(--rule)\">\n    <div class=\"kicker ink\">What changed vs. live · short list<\u002Fdiv>\n    <ol style=\"list-style:none;padding:0;margin:18px 0 0;display:grid;grid-template-columns:1fr 1fr;gap:14px 32px;font-size:13.5px;line-height:1.6;color:var(--fg-2)\">\n      <li><strong style=\"color:var(--fg);font-weight:500\">01 — Status colors.<\u002Fstrong> Saturated red/green → warm iron-oxide / olive. Affects planner over-limit indicators most.<\u002Fli>\n      <li><strong style=\"color:var(--fg);font-weight:500\">02 — Status pattern.<\u002Fstrong> Stacked text+icon rows → ink-on-tint pills. Affects planner nutrition panel.<\u002Fli>\n      <li><strong style=\"color:var(--fg);font-weight:500\">03 — Toasts replace inline confirm bars.<\u002Fstrong> Same warm palette.<\u002Fli>\n      <li><strong style=\"color:var(--fg);font-weight:500\">04 — Modal destructive button stays ink.<\u002Fstrong> Word \"Delete\" + context carries the warning, not red fill.<\u002Fli>\n      <li><strong style=\"color:var(--fg);font-weight:500\">05 — Onboarding chrome lightened.<\u002Fstrong> Heavy ink rule → hairline; swatch labels removed.<\u002Fli>\n      <li><strong style=\"color:var(--fg);font-weight:500\">06 — Empty / error states.<\u002Fstrong> No glyphs. Type-led; pill for errors.<\u002Fli>\n    <\u002Fol>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     01 · COLOR\n     ============================================================ -->\n<section id=\"color\" data-screen-label=\"01 Color\">\n  <div class=\"section-head\">\n    <h2>Brand is <em>paper &amp; ink<\u002Fem>. Color belongs to the person.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>01<\u002Fb>Color<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Demoted: sage. Promoted: the household.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"kicker ink\" style=\"margin-bottom:14px\">Brand surface — used everywhere<\u002Fdiv>\n  <div class=\"swatches\">\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#F5F4EF\"><\u002Fdiv><div class=\"name\">Paper<\u002Fdiv><div class=\"hex\">#F5F4EF<\u002Fdiv><div class=\"role\">--bg<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#EEEAE3\"><\u002Fdiv><div class=\"name\">Card<\u002Fdiv><div class=\"hex\">#EEEAE3<\u002Fdiv><div class=\"role\">--bg-2<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#E6E2D8\"><\u002Fdiv><div class=\"name\">Hover<\u002Fdiv><div class=\"hex\">#E6E2D8<\u002Fdiv><div class=\"role\">--bg-3<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#1A1916\"><\u002Fdiv><div class=\"name\">Ink<\u002Fdiv><div class=\"hex\">#1A1916<\u002Fdiv><div class=\"role\">--fg<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#36342F\"><\u002Fdiv><div class=\"name\">Body<\u002Fdiv><div class=\"hex\">#36342F<\u002Fdiv><div class=\"role\">--fg-2<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#6B6860\"><\u002Fdiv><div class=\"name\">Muted<\u002Fdiv><div class=\"hex\">#6B6860<\u002Fdiv><div class=\"role\">--muted<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"brand-only\">\n    <div class=\"h\">\"The brand is the absence of brand color.\"<\u002Fdiv>\n    <div class=\"p\">\n      Paper and ink. The wordmark, the rules, the buttons, the nav — all of it is\n      monochromatic. Color enters only when a <strong>person<\u002Fstrong> appears: their avatar\n      dot, the row that's \"theirs\" in the planner, the chip on the dashboard. This makes\n      the app feel personally inhabited without diluting the identity.\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"kicker ink\" style=\"margin:64px 0 14px\">Person themes — accent only, surfaces stay paper<\u002Fdiv>\n  <div class=\"swatches\">\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#5A9B6A\"><\u002Fdiv><div class=\"name\">Sage<\u002Fdiv><div class=\"hex\">#5A9B6A<\u002Fdiv><div class=\"role\">[data-theme=sage]<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#E84828\"><\u002Fdiv><div class=\"name\">Coral<\u002Fdiv><div class=\"hex\">#E84828<\u002Fdiv><div class=\"role\">[data-theme=coral]<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#C45C3A\"><\u002Fdiv><div class=\"name\">Terra<\u002Fdiv><div class=\"hex\">#C45C3A<\u002Fdiv><div class=\"role\">[data-theme=terra]<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#2B90C8\"><\u002Fdiv><div class=\"name\">Cerulean<\u002Fdiv><div class=\"hex\">#2B90C8<\u002Fdiv><div class=\"role\">[data-theme=cerulean]<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#8B5A9E\"><\u002Fdiv><div class=\"name\">Plum<\u002Fdiv><div class=\"hex\">#8B5A9E<\u002Fdiv><div class=\"role\">[data-theme=plum]<\u002Fdiv><\u002Fdiv>\n    <div class=\"swatch\"><div class=\"chip\" style=\"background:#5C7080\"><\u002Fdiv><div class=\"name\">Slate<\u002Fdiv><div class=\"hex\">#5C7080<\u002Fdiv><div class=\"role\">[data-theme=slate]<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     01·b · THE DOT — system mark, used scarcely\n     ============================================================ -->\n<section id=\"dot\" data-screen-label=\"01b Dot\">\n  <div class=\"section-head\">\n    <h2>The dot is the only round shape. <em>Save it.<\u002Fem><\u002Fh2>\n    <div>\n      <div class=\"num\"><b>01·b<\u002Fb>The Dot<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Everything else is rules and rectangles. The dot earns meaning by being scarce.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- semantics row -->\n  <div style=\"display:grid;grid-template-columns:1fr 1.4fr;gap:48px;border-top:1px solid var(--rule);padding-top:36px\">\n    <div>\n      <div class=\"kicker ink\">What the dot means<\u002Fdiv>\n      <div style=\"margin-top:18px;font-family:var(--serif-display);font-style:italic;font-size:32px;line-height:1.15;color:var(--fg);max-width:18ch\">The system measures. The dot is what gets measured.<\u002Fdiv>\n      <p style=\"margin-top:18px;font-size:13.5px;line-height:1.65;color:var(--fg-2);max-width:42ch\">\n        Rectangles are the apparatus — grids, rules, columns, the planner, the cards. Round shapes are reserved for the <em style=\"font-family:var(--serif-display);font-style:italic;color:var(--fg)\">human and singular<\u002Fem> things inside the apparatus: the person, the present moment, the unit. A loose nod, too, to a teaspoon or a scoop — the smallest measurement.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:0;border:1px solid var(--rule);background:var(--bg)\">\n      <div style=\"display:grid;grid-template-columns:140px 1fr 200px;gap:24px;padding:22px 24px;border-bottom:1px solid var(--rule);align-items:center\">\n        <span class=\"label\" style=\"color:var(--fg)\">Person<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:14px\">\n          <span style=\"width:22px;height:22px;border-radius:9999px;background:#E84828\"><\u002Fspan>\n          <span style=\"font-family:var(--sans);font-size:14px;font-weight:500;color:var(--fg)\">Jen<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"mono\" style=\"font-size:9.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-align:right\">Avatar dot · in theme color<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:140px 1fr 200px;gap:24px;padding:22px 24px;border-bottom:1px solid var(--rule);align-items:center\">\n        <span class=\"label\" style=\"color:var(--fg)\">Now<\u002Fspan>\n        <div style=\"display:flex;align-items:center;gap:14px\">\n          <span style=\"width:8px;height:8px;border-radius:9999px;background:var(--fg)\"><\u002Fspan>\n          <span class=\"mono\" style=\"font-size:11px;letter-spacing:0.04em;color:var(--fg)\">Sun · 04.27 — today<\u002Fspan>\n        <\u002Fdiv>\n        <span class=\"mono\" style=\"font-size:9.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);text-align:right\">Today-cell · current step<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- where the dot does NOT go -->\n  <div style=\"margin-top:48px;display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--rule)\">\n    <div style=\"padding:32px 36px;border-right:1px solid var(--rule)\">\n      <div class=\"kicker ink\">Where it goes<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:10px;font-size:13.5px;line-height:1.55;color:var(--fg-2)\">\n        <li>· Avatar — the person mark, in their theme color<\u002Fli>\n        <li>· Today-cell on the week strip · current step in onboarding<\u002Fli>\n        <li>· App icon · favicon — paper dot on ink square<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div style=\"padding:32px 36px;background:var(--bg-2)\">\n      <div class=\"kicker ink\">Where it doesn't<\u002Fdiv>\n      <ul style=\"list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:10px;font-size:13.5px;line-height:1.55;color:var(--fg-2)\">\n        <li>· Not as a generic nav glyph (Today / Recipes / Pantry / Plan)<\u002Fli>\n        <li>· Not as a decorative bullet inside long body copy<\u002Fli>\n        <li>· Not as a status-color disc (status uses pills, not dots)<\u002Fli>\n        <li>· Not stacked or repeated as ornament<\u002Fli>\n      <\u002Ful>\n      <p style=\"margin-top:14px;font-size:12.5px;line-height:1.6;color:var(--muted);font-style:italic;font-family:var(--serif-display)\">Used scarcely, the dot stays charged. Used everywhere, it becomes wallpaper.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     02 · TYPE\n     ============================================================ -->\n<section id=\"type\" data-screen-label=\"02 Type\">\n  <div class=\"section-head\">\n    <h2>DM Sans, DM Mono, and one <em>italic serif<\u002Fem> for emphasis.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>02<\u002Fb>Type<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Italics in display copy switch to Instrument Serif. Body italics stay sans.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Instrument Serif rules of use -->\n  <div style=\"margin-bottom:48px;padding:32px 36px;background:var(--bg);border:1px solid var(--fg);display:grid;grid-template-columns:1fr 2fr;gap:36px;align-items:start\">\n    <div>\n      <div class=\"kicker ink\">Instrument Serif · rules of use<\u002Fdiv>\n      <div style=\"margin-top:14px;font-family:var(--serif-display);font-style:italic;font-size:24px;line-height:1.2;color:var(--fg)\">Used as a spice, not a sauce. Wrong-handed, it fights DM Sans instead of complementing it.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px;font-size:13.5px;line-height:1.6;color:var(--fg-2)\">\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--fg)\">✓ Italic only<\u002Fdiv>\n        <div>Never set Instrument Serif upright. The roman is a different voice and breaks the pairing.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--fg)\">✓ Display sizes only<\u002Fdiv>\n        <div>24px and up. Headlines, hero pull-words, modal h4s, big editorial moments. Below 24px the contrast disappears and it just looks like a font swap mistake.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--fg)\">✓ One word, rarely two<\u002Fdiv>\n        <div>One emphasized word per headline. “Measure what <em style=\"font-family:var(--serif-display);font-style:italic;color:var(--fg)\">matters<\u002Fem>.” — not whole phrases.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--status-red)\">✗ Not in body<\u002Fdiv>\n        <div>Body italics (14px and below, inside paragraphs) stay DM Sans italic. Don’t reach for the serif to mark a recipe name or emphasize a verb mid-sentence.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px\">\n        <div class=\"label\" style=\"color:var(--status-red)\">✗ Not as decoration<\u002Fdiv>\n        <div>Not for eyebrows, labels, captions, or numerals. Not in the wordmark. Not as the default emphasis tag <code>&lt;em&gt;<\u002Fcode> globally — scope it to the display contexts where it earns its keep.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- tracking discipline rule -->\n  <div style=\"margin-bottom:48px;padding:32px 36px;background:var(--bg-2);border:1px solid var(--rule);display:grid;grid-template-columns:1fr 2fr;gap:36px;align-items:start\">\n    <div>\n      <div class=\"kicker ink\">Tracking discipline<\u002Fdiv>\n      <div style=\"margin-top:14px;font-family:var(--serif-display);font-style:italic;font-size:28px;line-height:1.1;color:var(--fg)\">As size goes up, tracking gets tighter — never the other way around.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px;font-size:13.5px;line-height:1.6;color:var(--fg-2)\">\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--fg)\">Headlines &amp; display<\u002Fdiv>\n        <div>Always negative tracking — generous, not extreme. 24px = −0.01em → 40px = −0.018em → 64px = −0.02em → 96–128px = −0.018 to −0.022em. The voice is editorial, not brutalist.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px;padding-bottom:14px;border-bottom:1px solid var(--rule)\">\n        <div class=\"label\" style=\"color:var(--fg)\">Body<\u002Fdiv>\n        <div>Default — tracking 0. Don't tighten body copy. It already breathes at 14px / 1.55.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 2fr;gap:20px\">\n        <div class=\"label\" style=\"color:var(--fg)\">Eyebrows / labels / caps<\u002Fdiv>\n        <div>Always positive. 9–11px UPPERCASE mono — tracking +0.12em to +0.16em. Caps need air; lowercase doesn't.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"type-grid\">\n    <div class=\"type-row\">\n      <div>Hero · single-line<\u002Fdiv>\n      <div><span class=\"type-hero\">Good afternoon, <em>Jen<\u002Fem><\u002Fspan><\u002Fdiv>\n      <div><span>DM Sans 500 · person name in <em style=\"color:#E84828;font-style:normal;font-family:inherit\">theme color<\u002Fem>, upright<br>96–128px · tracking −0.018em<br>line 1.0 · dashboard greeting<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div>Hero · multi-line<\u002Fdiv>\n      <div><span style=\"font-family:var(--sans);font-weight:500;font-size:80px;letter-spacing:-0.02em;line-height:1.05;color:var(--fg);display:inline-block;max-width:14ch\">A nutrition app for people who <em style=\"font-family:var(--serif-display);font-style:italic;font-weight:400;color:var(--fg)\">actually<\u002Fem> cook.<\u002Fspan><\u002Fdiv>\n      <div><span>DM Sans 500 · 80–128px<br>tracking −0.02em · line 1.05<br>landing hero · wraps 2–3 lines<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div>Display · premise<\u002Fdiv>\n      <div><span style=\"font-family:var(--sans);font-weight:500;font-size:48px;letter-spacing:-0.018em;line-height:1.08;color:var(--fg);display:inline-block;max-width:18ch\">Most nutrition apps log what you ate. Good Measure plans one against <em style=\"font-family:var(--serif-display);font-style:italic;font-weight:400;color:var(--fg)\">the other<\u002Fem>.<\u002Fspan><\u002Fdiv>\n      <div><span>DM Sans 500 · 40–56px<br>tracking −0.018em · line <strong>1.08<\u002Fstrong><br>premise blocks · stays tight<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div>Title<\u002Fdiv>\n      <div><span class=\"type-h1\">Today is Sunday, April 27.<\u002Fspan><\u002Fdiv>\n      <div><span>DM Sans 500 · 40px<br>tracking −0.02em · line 1.1<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div>Section<\u002Fdiv>\n      <div><span class=\"type-h2\">Pantry — 184 ingredients<\u002Fspan><\u002Fdiv>\n      <div><span>DM Sans 500 · 24px<br>tracking −0.01em · line 1.2<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div>Body<\u002Fdiv>\n      <div><span class=\"type-body\">For people who actually cook. Your pantry, your recipes, your week — <em>measured to the gram<\u002Fem>, planned as a system.<\u002Fspan><\u002Fdiv>\n      <div><span>DM Sans 400 · 14px · line 1.55<br>color --fg-2<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div>Eyebrow<\u002Fdiv>\n      <div><span class=\"type-eyebrow ink\">§ This Week<\u002Fspan><span class=\"type-eyebrow\" style=\"margin-left:18px\">Step 02 / 03<\u002Fspan><\u002Fdiv>\n      <div><span>DM Sans 500 · 9px · UPPERCASE<br>tracking 0.14em · always<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div>Mono data<\u002Fdiv>\n      <div><span class=\"type-meta\">1,847<span class=\"u\">kcal<\u002Fspan> · 124<span class=\"u\">g<\u002Fspan> protein · 38<span class=\"u\">g<\u002Fspan> fiber<\u002Fspan><\u002Fdiv>\n      <div><span>DM Mono 400 · 11px<br>tabular-nums · tracking 0.04em<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"type-row\">\n      <div>Tabular<\u002Fdiv>\n      <div><span class=\"type-tabnum\">01 / 03 — 04.27.2026<\u002Fspan><\u002Fdiv>\n      <div><span>DM Mono 400 · 18px<br>step counters · dates<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- tracking ladder — same word, six sizes -->\n  <div style=\"margin-top:64px;border-top:1px solid var(--rule);padding-top:36px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:32px\">\n      <div class=\"kicker ink\">Tracking ladder · the same word at every step<\u002Fdiv>\n      <div class=\"kicker\">Negative tracking scales with size<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:8px\">\n      <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:24px;align-items:baseline;border-bottom:1px solid var(--rule-faint);padding:20px 0\">\n        <span class=\"label\">Hero · 160px<\u002Fspan>\n        <span style=\"font-family:var(--sans);font-weight:500;font-size:160px;letter-spacing:-0.025em;line-height:1.0;color:var(--fg)\">Measure<\u002Fspan>\n        <span class=\"mono\" style=\"font-size:10px;letter-spacing:0.06em;color:var(--muted);text-align:right\">−0.025em · line 1.0<br>dashboard greeting<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:24px;align-items:baseline;border-bottom:1px solid var(--rule-faint);padding:20px 0\">\n        <span class=\"label\">Hero · 96px<\u002Fspan>\n        <span style=\"font-family:var(--sans);font-weight:500;font-size:96px;letter-spacing:-0.022em;line-height:1.02;color:var(--fg)\">Measure<\u002Fspan>\n        <span class=\"mono\" style=\"font-size:10px;letter-spacing:0.06em;color:var(--muted);text-align:right\">−0.022em · line 1.02<br>landing hero · single-line<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:24px;align-items:baseline;border-bottom:1px solid var(--rule-faint);padding:20px 0\">\n        <span class=\"label\">Display · 64px<\u002Fspan>\n        <span style=\"font-family:var(--sans);font-weight:500;font-size:64px;letter-spacing:-0.02em;line-height:1.05;color:var(--fg)\">Measure<\u002Fspan>\n        <span class=\"mono\" style=\"font-size:10px;letter-spacing:0.06em;color:var(--muted);text-align:right\">−0.02em · line 1.05<br>page titles<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:24px;align-items:baseline;border-bottom:1px solid var(--rule-faint);padding:20px 0\">\n        <span class=\"label\">Title · 40px<\u002Fspan>\n        <span style=\"font-family:var(--sans);font-weight:500;font-size:40px;letter-spacing:-0.02em;line-height:1.1;color:var(--fg)\">Measure<\u002Fspan>\n        <span class=\"mono\" style=\"font-size:10px;letter-spacing:0.06em;color:var(--muted);text-align:right\">−0.02em · line 1.1<br>recipe titles · cards<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:24px;align-items:baseline;border-bottom:1px solid var(--rule-faint);padding:20px 0\">\n        <span class=\"label\">Section · 24px<\u002Fspan>\n        <span style=\"font-family:var(--sans);font-weight:500;font-size:24px;letter-spacing:-0.01em;line-height:1.2;color:var(--fg)\">Measure<\u002Fspan>\n        <span class=\"mono\" style=\"font-size:10px;letter-spacing:0.06em;color:var(--muted);text-align:right\">−0.01em · line 1.2<br>chapter heads · toolbars<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:24px;align-items:baseline;border-bottom:1px solid var(--rule-faint);padding:20px 0\">\n        <span class=\"label\">Body · 14px<\u002Fspan>\n        <span style=\"font-family:var(--sans);font-weight:400;font-size:14px;letter-spacing:0;line-height:1.55;color:var(--fg)\">Measure<\u002Fspan>\n        <span class=\"mono\" style=\"font-size:10px;letter-spacing:0.06em;color:var(--muted);text-align:right\">0 · line 1.55<br>paragraph default<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:140px 1fr 220px;gap:24px;align-items:baseline;padding:20px 0\">\n        <span class=\"label\">Eyebrow · 9px<\u002Fspan>\n        <span style=\"font-family:var(--sans);font-weight:500;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--fg)\">MEASURE<\u002Fspan>\n        <span class=\"mono\" style=\"font-size:10px;letter-spacing:0.06em;color:var(--muted);text-align:right\">+0.14em · uppercase<br>caps need air<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:24px;font-size:13px;line-height:1.65;color:var(--fg-2);max-width:60ch\">\n      Modest tightening — the system is editorial, not crammed. The dashboard greeting and the landing hero both sit around <em style=\"font-family:var(--serif-display);font-style:italic;color:var(--fg)\">−0.022 to −0.025em<\u002Fem>. Going further breaks the voice.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     03 · COMPONENTS (tight reprise)\n     ============================================================ -->\n<section id=\"components\" data-screen-label=\"03 Components\">\n  <div class=\"section-head\">\n    <h2>The full kit — <em>still<\u002Fem> paper, ink, and one rule.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>03<\u002Fb>Components<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Restored from v1: button, chip, input, toolbar, stat, recipe card, person, status pill — plus warm status colors.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"gx gx-3\">\n    <!-- Button -->\n    <div class=\"cell\">\n      <h3>Button<\u002Fh3>\n      <p class=\"desc\">Primary / Outline / Ghost. 9px / 600 / UPPERCASE / 0.14em. Sharp corners.<\u002Fp>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:24px;align-items:center\">\n        <button class=\"ed-btn primary\">Save Recipe<\u002Fbutton>\n        <button class=\"ed-btn\">Cancel<\u002Fbutton>\n        <button class=\"ed-btn ghost\">Skip<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Chip -->\n    <div class=\"cell\">\n      <h3>Chip · sort · filter<\u002Fh3>\n      <p class=\"desc\">Underline-on-active. No fill, no border. Mono label.<\u002Fp>\n      <div style=\"display:flex;gap:18px;margin-top:24px;flex-wrap:wrap\">\n        <button class=\"ed-chip is-active\">All<\u002Fbutton>\n        <button class=\"ed-chip\">Mains<\u002Fbutton>\n        <button class=\"ed-chip\">Sides<\u002Fbutton>\n        <button class=\"ed-chip\">Desserts<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Input -->\n    <div class=\"cell\">\n      <h3>Input · field<\u002Fh3>\n      <p class=\"desc\">Bottom-rule only. The page is the field.<\u002Fp>\n      <div style=\"margin-top:24px\">\n        <div class=\"label\" style=\"margin-bottom:6px\">Recipe name<\u002Fdiv>\n        <input class=\"ed-input\" type=\"text\" placeholder=\"e.g. lentil soup\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Toolbar -->\n    <div class=\"cell\">\n      <h3>Toolbar<\u002Fh3>\n      <p class=\"desc\">Section-bar pattern. Title left, actions right, hairline below.<\u002Fp>\n      <div style=\"margin-top:24px;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:14px 0;display:flex;justify-content:space-between;align-items:center\">\n        <div>\n          <div class=\"label\">§ Pantry<\u002Fdiv>\n          <div style=\"font-size:18px;font-weight:600;letter-spacing:-0.015em;margin-top:4px\">184 items<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:18px\">\n          <button class=\"ed-chip is-active\">All<\u002Fbutton>\n          <button class=\"ed-chip\">Low<\u002Fbutton>\n          <button class=\"ed-chip\">Expiring<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Stat cell -->\n    <div class=\"cell\">\n      <h3>Stat cell · dashboard<\u002Fh3>\n      <p class=\"desc\">Mono numerals, tabular nums, label above and beneath.<\u002Fp>\n      <div style=\"margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--rule);border-left:1px solid var(--rule)\">\n        <div style=\"padding:18px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule)\">\n          <div class=\"label\">Calories · today<\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:28px;letter-spacing:-0.02em;margin-top:6px;font-variant-numeric:tabular-nums\">1,247<\u002Fdiv>\n          <div class=\"label\" style=\"margin-top:4px;color:var(--ok)\">−312 vs avg<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:18px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule)\">\n          <div class=\"label\">Protein<\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:28px;letter-spacing:-0.02em;margin-top:6px;font-variant-numeric:tabular-nums\">94<span style=\"font-size:14px;color:var(--muted);margin-left:2px\">g<\u002Fspan><\u002Fdiv>\n          <div class=\"label\" style=\"margin-top:4px;color:var(--ok)\">on track<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Recipe card -->\n    <div class=\"cell\">\n      <h3>Recipe card<\u002Fh3>\n      <p class=\"desc\">Thumb · category · title · meta. The unit of the app.<\u002Fp>\n      <div style=\"margin-top:24px;border:1px solid var(--rule);padding:18px;display:flex;gap:14px;background:var(--bg)\">\n        <div style=\"width:60px;height:60px;background:repeating-linear-gradient(135deg,var(--bg-2) 0 8px,var(--bg-3) 8px 9px);flex-shrink:0\"><\u002Fdiv>\n        <div style=\"flex:1\">\n          <div class=\"label\">§ Mains · 35 min<\u002Fdiv>\n          <div style=\"font-size:15px;font-weight:600;letter-spacing:-0.01em;margin-top:4px\">Roasted carrots &amp; <em style=\"font-family:var(--serif-display);font-style:italic;font-weight:400\">tahini<\u002Fem><\u002Fdiv>\n          <div style=\"font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.06em;margin-top:6px;font-variant-numeric:tabular-nums\">412 kcal · 18g protein<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Person identity -->\n    <div class=\"cell\">\n      <h3>Person identity<\u002Fh3>\n      <p class=\"desc\">Color belongs to the person. Avatar dot is the only place it appears.<\u002Fp>\n      <div style=\"margin-top:24px;display:flex;flex-direction:column;gap:14px\">\n        <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"width:24px;height:24px;border-radius:9999px;background:#5A9B6A;flex-shrink:0\"><\u002Fspan><span style=\"font-size:14px;font-weight:500\">Dana<\u002Fspan><span class=\"label\" style=\"margin-left:auto\">sage<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"width:24px;height:24px;border-radius:9999px;background:#E84828;flex-shrink:0\"><\u002Fspan><span style=\"font-size:14px;font-weight:500\">Mira<\u002Fspan><span class=\"label\" style=\"margin-left:auto\">coral<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"width:24px;height:24px;border-radius:9999px;background:#2B90C8;flex-shrink:0\"><\u002Fspan><span style=\"font-size:14px;font-weight:500\">Theo<\u002Fspan><span class=\"label\" style=\"margin-left:auto\">cerulean<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Status pill -->\n    <div class=\"cell\">\n      <h3>Status pill<\u002Fh3>\n      <p class=\"desc\">Warm status colors. Soft fill, mono label, dot indicator. Never neon.<\u002Fp>\n      <div style=\"margin-top:24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center\">\n        <span style=\"background:#E8EDDF;color:#4A6B3A;padding:5px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px\"><span style=\"width:6px;height:6px;border-radius:9999px;background:#4A6B3A\"><\u002Fspan>Within range<\u002Fspan>\n        <span style=\"background:#F5E5D2;color:#9C5E1F;padding:5px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px\"><span style=\"width:6px;height:6px;border-radius:9999px;background:#9C5E1F\"><\u002Fspan>At limit<\u002Fspan>\n        <span style=\"background:#F0DCD6;color:#A33A28;padding:5px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px\"><span style=\"width:6px;height:6px;border-radius:9999px;background:#A33A28\"><\u002Fspan>Over<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Toggle -->\n    <div class=\"cell\">\n      <h3>Toggle · checkbox<\u002Fh3>\n      <p class=\"desc\">Square check mark on hairline border. No iOS slider.<\u002Fp>\n      <div style=\"margin-top:24px;display:flex;flex-direction:column;gap:14px\">\n        <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"width:18px;height:18px;border:1px solid var(--fg);background:var(--fg);color:var(--bg);font-family:var(--mono);font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1\">✓<\u002Fspan><span style=\"font-size:14px\">Sync to iCloud<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"width:18px;height:18px;border:1px solid var(--rule);background:var(--bg)\"><\u002Fspan><span style=\"font-size:14px;color:var(--fg-2)\">Email weekly digest<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px\"><span style=\"width:18px;height:18px;border:1px solid var(--fg);background:var(--fg);color:var(--bg);font-family:var(--mono);font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1\">✓<\u002Fspan><span style=\"font-size:14px\">Show macros on cards<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     03b · STATUS COLORS (dedicated)\n     ============================================================ -->\n<section id=\"status\" data-screen-label=\"03b Status colors\">\n  <div class=\"section-head\">\n    <h2>Status uses <em>warm<\u002Fem>, not bright.<\u002Fh2>\n    <div>\n      <div class=\"num\"><b>03b<\u002Fb>Status<\u002Fdiv>\n      <div class=\"meta\" style=\"margin-top:8px\">Editorial palettes have all-purpose status colors, never neon. Match the paper warmth — green tilts olive, red tilts rust.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--rule);border-left:1px solid var(--rule)\">\n    <!-- OK -->\n    <div style=\"border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:32px;background:var(--bg)\">\n      <div class=\"kicker ink\">§ Within range / on track<\u002Fdiv>\n      <div style=\"margin-top:18px;display:flex;align-items:flex-end;gap:14px\">\n        <div style=\"width:64px;height:64px;background:#4A6B3A\"><\u002Fdiv>\n        <div style=\"width:64px;height:64px;background:#E8EDDF;border:1px solid var(--rule-faint)\"><\u002Fdiv>\n        <div style=\"flex:1\">\n          <div class=\"mono\" style=\"font-size:10px;color:var(--muted);letter-spacing:0.06em\">Ink #4A6B3A · Tint #E8EDDF<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--fg-2);margin-top:6px;line-height:1.55\">Olive-leaning green. The \"good\" reading without festive Christmas energy.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:20px\"><span style=\"background:#E8EDDF;color:#4A6B3A;padding:5px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;display:inline-flex;align-items:center;gap:8px\"><span style=\"width:6px;height:6px;border-radius:9999px;background:#4A6B3A\"><\u002Fspan>Within range<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Warn -->\n    <div style=\"border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);padding:32px;background:var(--bg)\">\n      <div class=\"kicker ink\">§ At limit / approaching<\u002Fdiv>\n      <div style=\"margin-top:18px;display:flex;align-items:flex-end;gap:14px\">\n        <div style=\"width:64px;height:64px;background:#9C5E1F\"><\u002Fdiv>\n        <div style=\"width:64px;height:64px;background:#F5E5D2;border:1px solid var(--rule-faint)\"><\u002Fdiv>\n        <div style=\"flex:1\">\n          <div class=\"mono\" style=\"font-size:10px;color:var(--muted);letter-spacing:0.06em\">Ink #9C5E1F · Tint #F5E5D2<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--fg-2);margin-top:6px;line-height:1.55\">Toasted ochre. Says \"pay attention\" without the school-bus alarm.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:20px\"><span style=\"background:#F5E5D2;color:#9C5E1F;padding:5px 12px;font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;display:inline-f
