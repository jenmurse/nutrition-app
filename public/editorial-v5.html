.pf-usda-result {
  padding:10px 12px; border-bottom:1px solid var(--rule); cursor:pointer;
  transition:background 0.1s;
}
.pf-usda-result:hover { background:var(--bg-3); }
.pf-usda-result-name { font-size:13px; font-weight:500; }
.pf-usda-result-meta { font-family:'DM Mono',monospace; font-size:8px; color:var(--muted); margin-top:2px; }
.pf-custom-unit-box {
  margin-bottom:20px;
}
.pf-custom-unit-title { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
.pf-meal-item-box {
  display:flex; align-items:center; gap:10px; padding:12px 0;
  margin-bottom:20px; cursor:pointer;
}
.pf-meal-item-box input[type="checkbox"] { cursor:pointer; }
.pf-meal-item-label { font-size:13px; }
.pf-meal-item-hint { font-size:13px; color:var(--muted); }
.pf-basis-row { display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.pf-basis-row .ed-input { width:80px; }
.pf-basis-hint { font-family:'DM Mono',monospace; font-size:8px; color:var(--muted); }
.pf-nutrient-grid { display:grid; grid-template-columns:1fr 1fr; gap:0 40px; margin-bottom:24px; }
.pf-nutrient-row {
  display:flex; align-items:center; gap:12px; padding:10px 0;
}
.pf-nutrient-name { width:120px; font-size:13px; flex-shrink:0; }
.pf-nutrient-row .ed-input { flex:1; text-align:right; }
.pf-nutrient-unit { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); width:32px; flex-shrink:0; }

/* ── MCP SETTINGS ── */
.mcp-token-status { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
.mcp-token-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.mcp-token-dot.active { background:var(--ok); }
.mcp-token-dot.none { background:var(--rule); }
.mcp-token-label { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.06em; }
.mcp-token-display {
  background:var(--bg-2); border:1px solid var(--accent); padding:12px 16px;
  margin:12px 0 16px; display:flex; align-items:center; gap:10px;
}
.mcp-token-value {
  font-family:'DM Mono',monospace; font-size:10px; color:var(--fg); word-break:break-all; flex:1;
}
.mcp-token-warn {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--accent); margin-bottom:8px;
}
.mcp-config-table { width:100%; border-collapse:collapse; margin:12px 0; font-size:12px; }
.mcp-config-table th {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.12em; text-transform:uppercase;
  color:var(--muted); text-align:left; padding:8px 0; border-bottom:1px solid var(--rule); font-weight:400;
}
.mcp-config-table td { padding:8px 0; border-bottom:1px solid var(--rule); color:var(--fg-2); }
.mcp-config-table td:first-child { font-weight:500; color:var(--fg); width:140px; }
.mcp-config-path { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); word-break:break-all; }
.mcp-code-block {
  background:var(--bg-2); padding:16px 20px;
  margin:12px 0; position:relative; overflow-x:auto;
}
.mcp-code-label {
  font-family:'DM Mono',monospace; font-size:7px; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--muted); position:absolute; top:8px; left:12px;
}
.mcp-code-copy {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--accent); background:none; border:none; cursor:pointer;
  position:absolute; top:8px; right:12px; transition:opacity 0.15s;
}
.mcp-code-copy:hover { opacity:0.7; }
.mcp-code-pre {
  font-family:'DM Mono',monospace; font-size:10px; line-height:1.7; color:var(--fg-2);
  padding-top:12px; white-space:pre; tab-size:2;
}
.mcp-tip {
  border-left:2px solid var(--accent); padding:10px 14px; margin:16px 0;
  font-size:12px; color:var(--fg-2); line-height:1.6;
}
.mcp-tip strong { color:var(--fg); }

/* ── AUTOCOMPLETE ── */
.ed-autocomplete { position:relative; }
.ed-ac-list {
  position:absolute; top:100%; left:0; right:0; z-index:50;
  background:var(--bg); border:1px solid var(--rule); box-shadow:var(--float-shadow);
  max-height:200px; overflow-y:auto;
  opacity:0; transform:translateY(-4px); pointer-events:none;
  transition:opacity 150ms var(--ease-out), transform 150ms var(--ease-out);
}
.ed-autocomplete.open .ed-ac-list { opacity:1; transform:translateY(0); pointer-events:auto; }
.ed-ac-item {
  padding:8px 12px; font-size:13px; cursor:pointer;
  transition:background 0.1s;
}
.ed-ac-item:hover, .ed-ac-item.highlighted { background:var(--bg-2); }
.ed-ac-item-sub { font-family:'DM Mono',monospace; font-size:8px; color:var(--muted); }

/* ── PAGE CONTENT ENTER TRANSITION ──
   Content containers animate on innerHTML re-render (no JS class needed).
   Jump navs are siblings — fixed positioning unaffected by sibling transforms. */
@keyframes contentEnter {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: none; }
}
.rd-scroll, .rf-page, .pf-page, .settings-page {
  animation: contentEnter 280ms var(--ease-out) both;
}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--rule)}

/* ══════════════════════════════
   HOME — Entry animations
══════════════════════════════ */
@keyframes hmFadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes hmFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes hmRuleGrow {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}

/* ══════════════════════════════
   HOME / DASHBOARD
══════════════════════════════ */
#pane-home { overflow-y: auto; }
.hm-hero { min-height: calc(100vh - var(--nav-h)); display: flex; flex-direction: column; }
.hm-hero-top { flex: 1; display: flex; align-items: flex-end; padding: 0 var(--pad) 48px; }
.hm-eyebrow {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px;
  opacity: 0; animation: hmFadeIn 500ms ease-out 0ms both;
  margin-left: 2px;
}
.hm-eyebrow-rule {
  width: 32px; height: 1px; background: var(--rule); display: inline-block;
  transform-origin: left; animation: hmRuleGrow 500ms var(--ease-out) 80ms both;
}
.hm-greeting {
  font-family: 'Bricolage Grotesque', sans-serif;
  line-height: 0.91; letter-spacing: -0.03em; font-weight: 500; font-size: 11.5vw;
  margin-left: -6px; /* optical margin alignment: pulls curved stroke left to align visually with margin */
}
.hm-greeting-line {
  display: block; opacity: 0;
  animation: hmFadeUp 700ms var(--ease-out) both;
}
.hm-greeting-line:first-child  { animation-delay: 40ms; }
.hm-greeting-line:nth-child(2) { animation-delay: 130ms; }
.hm-greeting-name {
  color: var(--accent); display: block;
  opacity: 0; animation: hmFadeUp 700ms var(--ease-out) 220ms both;
}
.hm-stats { border-top: 1px solid var(--rule); }
.hm-stats-inner { display: flex; padding: 0 var(--pad); }
.hm-stat {
  flex: 1; padding: 18px 0 20px;
  border-right: 1px solid var(--rule); padding-right: 32px; margin-right: 32px;
  opacity: 0; animation: hmFadeUp 500ms var(--ease-out) both;
}
.hm-stat:nth-child(1) { animation-delay: 350ms; }
.hm-stat:nth-child(2) { animation-delay: 430ms; }
.hm-stat:nth-child(3) { animation-delay: 510ms; }
.hm-stat:last-child { border-right: none; padding-right: 0; margin-right: 0; }
.hm-stat-label {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 5px;
}
.hm-stat-value {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 30px; font-weight: 700; letter-spacing: -0.025em; line-height: 1;
  font-variant-numeric: tabular-nums;
}
.hm-stat-sub {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.08em;
  color: var(--muted); margin-top: 5px;
}
.hm-stat-bar { height: 2px; background: var(--rule); margin-top: 10px; position: relative; }
.hm-stat-fill {
  position: absolute; inset: 0; background: var(--accent);
  transition: width 0.6s var(--ease-out);
}
.hm-section { padding: 0 var(--pad) 72px; }
.hm-sec-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 56px 0 28px; border-top: 1px solid var(--rule);
}
.hm-sec-head.no-rule { border-top: none; padding-top: 40px; }
.hm-sec-title {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--muted);
}
.hm-sec-link {
  font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent); cursor: pointer;
  transition: opacity 0.15s, transform 100ms var(--ease-out);
}
.hm-sec-link:hover { opacity: 0.7; }
.hm-sec-link:active { transform: scale(0.97); }
.hm-meals { display: flex; }
.hm-meal-col {
  flex: 1; padding: 0 36px;
  opacity: 0; transform: translateY(14px);
  transition: opacity 400ms var(--ease-out), transform 400ms var(--ease-out);
}
.hm-meal-col:first-child { padding-left: 0; }
.hm-meal-col:last-child  { padding-right: 0; }
.hm-meal-col.hm-in { opacity: 1; transform: translateY(0); }
.hm-meal-num {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  padding-bottom: 10px; border-bottom: 1px solid var(--rule);
}
.hm-meal-name {
  font-family: 'Bricolage Grotesque', sans-serif; font-size: 20px;
  font-weight: 700; letter-spacing: -0.02em; line-height: 1.15;
  margin-bottom: 12px; text-wrap: balance;
}
.hm-meal-row {
  display: flex; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid var(--rule);
}
.hm-meal-row:last-of-type { border-bottom: none; }
.hm-meal-row-label {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.hm-meal-row-val {
  font-family: 'Bricolage Grotesque', sans-serif; font-size: 14px;
  font-weight: 600; letter-spacing: -0.01em; font-variant-numeric: tabular-nums;
}
.hm-meal-link {
  font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent); margin-top: 14px;
  display: inline-block; cursor: pointer;
  transition: opacity 0.15s, transform 100ms var(--ease-out);
}
.hm-meal-link:hover { opacity: 0.7; }
.hm-meal-link:active { transform: scale(0.97); }
.hm-empty {
  padding: 48px 0; text-align: center; border: 1px dashed var(--rule);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.hm-empty-label {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted);
}
.hm-empty-cta {
  font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--accent); cursor: pointer;
  transition: opacity 0.15s, transform 100ms var(--ease-out);
}
.hm-empty-cta:hover { opacity: 0.7; }
.hm-empty-cta:active { transform: scale(0.97); }
.hm-week { display: flex; min-height: 55vh; align-items: stretch; }
.hm-week-col {
  flex: 1; min-width: 0; transition: background 0.2s var(--ease-out);
  opacity: 0; transform: translateY(14px);
  transition: opacity 400ms var(--ease-out), transform 400ms var(--ease-out), background 0.2s var(--ease-out);
}
.hm-week-col.is-today { background: var(--accent-l); }
.hm-week-col.hm-in { opacity: 1; transform: translateY(0); }
.hm-week-col-head { padding: 12px 14px 14px; }
.hm-week-col:first-child .hm-week-col-head,
.hm-week-col:first-child .hm-week-col-body { padding-left: 0; }
.hm-week-col:last-child .hm-week-col-head,
.hm-week-col:last-child .hm-week-col-body  { padding-right: 0; }
.hm-week-day {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.hm-week-col.is-today .hm-week-day { color: var(--accent); }
.hm-week-num {
  font-family: 'Bricolage Grotesque', sans-serif; font-size: 28px; font-weight: 700;
  letter-spacing: -0.02em; line-height: 1; margin-top: 2px; color: var(--fg-2);
  font-variant-numeric: tabular-nums;
}
.hm-week-col.is-today .hm-week-num { color: var(--fg); }
.hm-week-kcal {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.04em;
  color: var(--muted); margin-top: 4px;
}
.hm-week-bar { height: 2px; background: var(--rule); margin-top: 6px; position: relative; }
.hm-week-fill { position: absolute; inset: 0; background: var(--ok); transition: width 0.5s var(--ease-out); }
.hm-week-fill.today { background: var(--accent); }
.hm-week-col-body { padding: 8px 14px 72px; }
.hm-week-meal { padding: 6px 0; }
.hm-week-meal-type {
  font-family: 'DM Mono', monospace; font-size: 7px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 2px;
}
.hm-week-meal-name { font-family: 'DM Sans', sans-serif; font-size: 11px; color: var(--fg); line-height: 1.35; }
.hm-week-meal-kcal { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); margin-top: 1px; }
.hm-week-add {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); cursor: pointer;
  padding: 6px 0; display: block;
  transition: color 0.15s, transform 100ms var(--ease-out);
}
.hm-week-add:hover { color: var(--accent); }
.hm-week-add:active { transform: scale(0.97); }

/* ── GETTING STARTED CHECKLIST ── */
.gs-card {
  margin:16px var(--pad) 0; border:1px solid var(--rule); overflow:hidden;
  opacity:0; animation:contentEnter 280ms var(--ease-out) 600ms both;
  transition:max-height 320ms var(--ease-out), opacity 320ms var(--ease-out), margin-bottom 320ms var(--ease-out);
}
.gs-card.gs-exiting { max-height:0 !important; opacity:0; margin-bottom:0; border-color:transparent; overflow:hidden; }
.gs-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px;
}
.gs-title { font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--fg); }
.gs-count {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--accent); padding:2px 8px; background:var(--accent-l);
}
.gs-chevron { display:none; }
.gs-progress { height:2px; background:var(--rule); margin:0 20px; overflow:hidden; }
.gs-progress-fill { height:100%; background:var(--accent); transition:width 400ms var(--ease-out); }
/* collapsed state removed — checklist always open */
.gs-body {
  padding:4px 20px 8px;
  transition:max-height 300ms var(--ease-out), opacity 300ms var(--ease-out), padding 300ms var(--ease-out);
  overflow:hidden;
}
/* collapsed body state removed */
.gs-task {
  display:flex; align-items:center; gap:12px; padding:9px 0;
  border-bottom:1px solid var(--rule); cursor:pointer; text-decoration:none;
  transition:background 0.1s;
}
.gs-task:last-child { border-bottom:none; }
.gs-task:not(.gs-done):hover { background:var(--bg-2); margin:0 -20px; padding-left:20px; padding-right:20px; }
.gs-task:active:not(.gs-done) { transform:scale(0.997); }
.gs-check {
  width:16px; height:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  border:1.5px solid var(--rule); transition:background 200ms ease-out, border-color 200ms ease-out;
}
.gs-done .gs-check { background:var(--accent); border-color:var(--accent); }
.gs-check-svg { display:none; }
.gs-done .gs-check-svg { display:block; }
.gs-task-text { flex:1; font-size:13px; color:var(--fg); transition:color 0.15s; }
.gs-done .gs-task-text { color:var(--muted); text-decoration:line-through; }
.gs-task-note {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--muted); margin-left:4px;
}
.gs-task-arrow { color:var(--muted); flex-shrink:0; transition:transform 140ms var(--ease-out); }
.gs-task:not(.gs-done):hover .gs-task-arrow { transform:translateX(2px); }
.gs-done .gs-task-arrow { display:none; }
.gs-footer { display:flex; justify-content:flex-end; padding:12px 0 4px; }
.gs-dismiss {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; text-transform:uppercase;
  color:var(--muted); background:none; border:none; cursor:pointer; padding:0;
  transition:color 0.15s;
}
.gs-dismiss:hover { color:var(--fg); }

/* ── CONTEXTUAL TIP ── */
.ctx-tip {
  display:flex; gap:12px; padding:12px 16px;
  background:var(--accent-l); border-left:2px solid var(--accent);
  transition:opacity 200ms var(--ease-out), transform 200ms var(--ease-out), max-height 200ms var(--ease-out);
}
.ctx-tip.ctx-exiting { opacity:0; transform:translateY(-4px); max-height:0; padding:0 16px; margin:0; overflow:hidden; }
.ctx-tip-icon { flex-shrink:0; color:var(--accent); margin-top:1px; }
.ctx-tip-body { flex:1; min-width:0; }
.ctx-tip-label {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--accent); margin-bottom:4px;
}
.ctx-tip-text { font-size:12px; color:var(--fg-2); line-height:1.6; }
.ctx-tip-text a { color:var(--accent); text-decoration:underline; text-underline-offset:2px; }
.ctx-tip-close {
  width:16px; height:16px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  background:none; border:none; cursor:pointer; color:var(--muted);
  transition:color 0.15s;
}
.ctx-tip-close:hover { color:var(--fg); }

/* Planner week columns — opacity-only stagger, no transform (avoids GPU layer depromotion jog) */
@keyframes plannerColIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
.wk-day-col {
  opacity: 0;
  animation: plannerColIn 380ms ease-out calc(var(--col-i, 0) * 45ms) both;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  .hm-eyebrow, .hm-greeting-line, .hm-greeting-name,
  .hm-stat, .hm-meal-col, .hm-week-col, .wk-day-col,
  .rd-scroll, .rf-page, .pf-page, .settings-page, .rd-jump-nav,
  .ob-body, .ob-complete-card, .ob-complete-check,
  .gs-card, .ctx-tip,
  .ev-spacer, .ev-day-head, .ev-row-label, .ev-cell {
    animation: none !important;
    opacity: 1 !important;
    transform: none !important;
    transition: none !important;
  }
}

/* ── THEME SWATCHES ── */
.theme-swatch-grid { display:flex; gap:6px; flex-wrap:nowrap; align-items:center; }
.theme-swatch {
  width:20px; height:20px; border-radius:50%; cursor:pointer; flex-shrink:0;
  transition:transform 0.15s var(--ease-out), box-shadow 0.15s;
  position:relative;
}
.theme-swatch:hover { transform:scale(1.15); }
.theme-swatch:active { transform:scale(0.95); }
.theme-swatch.active {
  box-shadow:0 0 0 2px var(--bg),0 0 0 3.5px var(--swatch-color);
}
.theme-swatch-name {
  font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.08em;
  text-transform:uppercase; color:var(--muted); margin-top:6px;
  min-height:12px;
}

/* ── EMPTY STATES ── */
.empty-state {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:100px 24px 120px; max-width:520px; margin:0 auto; text-align:center;
}
.es-eyebrow {
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.16em;
  text-transform:uppercase; color:var(--muted); margin-bottom:28px;
}
.es-headline {
  font-family:'Bricolage Grotesque',sans-serif; font-size:clamp(38px,5vw,54px);
  font-weight:700; line-height:1.05; letter-spacing:-0.025em; color:var(--fg);
  margin:0 0 20px; text-wrap:balance;
}
.es-body {
  font-size:15px; color:var(--muted); line-height:1.65;
  margin:0 0 40px; text-wrap:balance; max-width:380px;
}
.es-actions { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.es-btn-primary {
  background:var(--accent); color:var(--accent-fg); border:none;
  padding:11px 22px; font-family:inherit; font-size:13px; font-weight:600;
  letter-spacing:0.02em; cursor:pointer;
  transition:opacity 0.15s var(--ease-out), transform 0.1s var(--ease-out);
}
.es-btn-primary:hover { opacity:0.85; }
.es-btn-primary:active { transform:scale(0.97); }
.es-btn-secondary {
  background:transparent; color:var(--fg); border:1px solid var(--rule);
  padding:11px 22px; font-family:inherit; font-size:13px; font-weight:500;
  letter-spacing:0.02em; cursor:pointer;
  transition:border-color 0.15s, transform 0.1s var(--ease-out);
}
.es-btn-secondary:hover { border-color:var(--fg); }
.es-btn-secondary:active { transform:scale(0.97); }
/* demo toggle — small pill in filter bar */
.filter-demo-toggle {

/* ─── RECIPES — editorial grid ─── */
function buildRecipes(q) {
  q = (q || '').toLowerCase().trim();
  currentSearch = q;
  const pane = document.getElementById('pane-recipes');
  const isEditorial = !q && !activeFilter;

  let flt = [...R];
  if (q) flt = flt.filter(r => r.name.toLowerCase().includes(q) || r.cat.toLowerCase().includes(q));
  if (activeFilter) flt = flt.filter(r => (r.tags||[r.cat.toLowerCase()]).includes(activeFilter.toLowerCase()));

  const dir = sortAsc ? 1 : -1;
  if (sortBy === 'name') flt.sort((a,b) => dir * a.name.localeCompare(b.name));
  else flt.sort((a,b) => dir * ((a[sortBy]||0) - (b[sortBy]||0)));

  let html = filterBarHTML(q, flt.length);

  if (recipesEmpty) {
    html += recipesEmptyHTML();
  } else if (isEditorial) {
    html += flatGridHTML(R);
  } else {
    if (q) html += `<div class="rg-search-header">Results for "<span class="rg-search-query">${q}</span>" — ${flt.length} recipe${flt.length!==1?'s':''}</div>`;
    html += flatGridHTML(flt);
  }

  pane.innerHTML = html;
}

function sectionGridHTML(recipes) {
  // Group by category in defined order
  const grouped = {};
  recipes.forEach(r => { (grouped[r.cat] = grouped[r.cat]||[]).push(r); });
  const sections = SEC_ORDER.filter(s => grouped[s]);
  // Any categories not in SEC_ORDER
  Object.keys(grouped).forEach(k => { if (!SEC_ORDER.includes(k)) sections.push(k); });

  let html = '';
  let globalIdx = 0;

  sections.forEach((sec, si) => {
    const items = grouped[sec];
    const delay = si * 80; // stagger section dividers
    html += `
    <div class="sec-divider" style="animation-delay:${delay}ms">
      <span class="sec-divider-name">${sec}</span>
      <span class="sec-divider-rule"></span>
      <span class="sec-divider-count">${items.length}</span>
    </div>
    <div class="rg ${listMode?'list':'c'+gridCols}">
      ${items.map(r => {
        const ci = globalIdx++;
        return cardHTML(r, ci);
      }).join('')}
    </div>`;
  });

  return html;
}

function flatGridHTML(recipes) {
  if (listMode) {
    return `<div class="rg list">
      ${recipes.map((r,i) => cardHTML(r, i)).join('')}
    </div>`;
  }
  return `<div class="rg-wrap"><div class="rg c${gridCols}">
    ${recipes.map((r,i) => cardHTML(r, i)).join('')}
  </div></div>`;
}

function phHTML(r) {
  if (r.img) return `<img class="rg-img" src="${r.img}" alt="${r.name}" loading="lazy">`;
  // Word-boundary cap: take words until ~30 chars, then stop cleanly
  const words = r.name.split(' ');
  let capped = '';
  for (const w of words) {
    if ((capped + ' ' + w).trim().length > 30) break;
    capped = (capped + ' ' + w).trim();
  }
  return `<div class="rg-img-ph"><span class="ph-name-text">${capped}</span></div>`;
}

          <span class="rg-m">F ${r.fat}g</span>
        </span>

    </div>
    <div class="rg-bar"></div>
  </div>`;
}

function toggleSortMenu() {
  const menu = document.getElementById('sort-menu');
  if (!menu) return;
  const isOpen = menu.classList.toggle('open');
  if (isOpen) {
    const close = (e) => { if (!document.getElementById('sort-group')?.contains(e.target)) { closeSortMenu(); document.removeEventListener('click', close); } };
    setTimeout(() => document.addEventListener('click', close), 0);
  }
}
function closeSortMenu() {
  const menu = document.getElementById('sort-menu');
  if (menu) menu.classList.remove('open');
}

function toggleSearch() {
  searchOpen = !searchOpen;
  const inp = document.getElementById('filter-search-input');
  const btn = document.querySelector('.filter-search-btn');
  if (inp) {
    if (searchOpen) {
      inp.classList.add('open');
      if (btn) btn.classList.add('active-search');
      setTimeout(() => inp.focus(), 260);
    } else {
      inp.classList.remove('open');
      if (btn) btn.classList.remove('active-search');
      if (inp.value) { inp.value = ''; buildRecipes(''); }
    }
  }
}

function nutRow(label, val, unit, goalVal, isMax) {
  const p = Math.min(Math.round(val/goalVal*100), 100);
  const cls = isMax && val/goalVal > 1 ? 'fill-err' : 'fill-ok';
  return `<div class="nut-row">
    <div class="nut-row-top">
      <span class="nut-name">${label}</span>
      <span class="nut-val">${val}${unit} <span class="nut-pct">/ ${goalVal}${unit}</span></span>
    </div>
    <div class="nut-track"><div class="nut-fill ${cls}" style="width:${p}%"></div></div>
  </div>`;
}

  if (pantryFilter === 'foods') items = items.filter(p => ['Produce','Dairy','Protein','Grains','Bakery','Legumes'].includes(p.cat));
  if (pantryFilter === 'ingredients') items = items.filter(p => ['Spreads','Seeds','Baking','Oils','Spices'].includes(p.cat));
  if (pantryListMode) items.sort((a,b) => a.name.localeCompare(b.name));

  const bodyHTML = pantryListMode

  document.getElementById('pane-pantry').innerHTML = `

function buildEveryoneGrid() {
  let html = `<div class="ev-grid">`;
  // Header row
  html += `<div class="ev-spacer"></div>`;
  DAYS.forEach((d,i) => {
    html += `<div class="ev-day-head ${i===TODAY?'today':''}" style="--col-i:${i}">
      <div class="ev-dname">${d}</div>
      <div class="ev-dnum">${DATES[i]}</div>
    </div>`;
  });
  // Person rows
  PEOPLE.forEach((p, ri) => {
    html += `<div class="ev-row-label" style="--row-i:${ri}">
      <span class="ev-row-dot" style="background:${p.accent}"></span>
      <span class="ev-row-name">${p.name}</span>
    </div>`;
    DAYS.forEach((_,i) => {
      const d = p.plan[i];
      const typeMap = {b:'B',l:'L',d:'D',s:'S'};
      let inner = '';
      ['b','l','d','s'].forEach(t => {
        d[t].forEach(m => {
          inner += `<div class="ev-cell-meal"><span class="ev-meal-type">${typeMap[t]}</span>${m.n}</div>`;
        });
      });
      const todayCls = i===TODAY ? 'today' : '';
      html += `<div class="ev-cell ${todayCls}" style="--row-i:${ri}">${inner}</div>`;
    });
  });
  html += `</div>`;
  return html;
}

function buildPlanner(person) {
  planPerson = person;
  const planMap = {jen:planJen, garth:planGarth, alex:planAlex, sam:planSam};
  const plan = planMap[person] || planJen;
  const isEv = person==='everyone';
  const mealTypes = ['b','l','d','s'];
  const mealLabels = {b:'Breakfast', l:'Lunch', d:'Dinner', s:'Snack'};

  // Per-day calorie totals
  const dayKcals = Array.from({length:7}, (_,di) => {
    const jd = planJen[di], gd = planGarth[di];
    if (isEv) return jd.b.concat(jd.l,jd.d,jd.s,gd.b,gd.l,gd.d,gd.s).reduce((a,m)=>a+m.k,0);
    return plan[di].b.concat(plan[di].l,plan[di].d,plan[di].s).reduce((a,m)=>a+m.k,0);
  });

  // Build day columns
  let dayCols = '';
  DAYS.forEach((d,i) => {
    const pct = Math.min(Math.round(dayKcals[i] / goals.kcal * 100), 100);
    const todayCls = i===TODAY ? 'today' : '';
    const dayData = isEv ? null : plan[i];
    const dayLabel = `${DAYS[i]} ${DATES[i]}`;

    // Build meal sections for this day
    let sections = '';
    mealTypes.forEach(key => {
      if (isEv) {
        const jm = planJen[i][key], gm = planGarth[i][key];
        if (jm.length || gm.length) {
          sections += `<div class="wk-meal-section">
            <div class="wk-meal-label">${mealLabels[key]}</div>`;
          if (jm.length) {
            sections += `<div class="ev-person-label"><span class="ev-person-dot" style="background:#E84828"></span>Jen</div>`;
            sections += jm.map(m => `<div class="meal-chip"><span class="meal-chip-name">${m.n}</span><span class="meal-chip-kcal">${m.k} kcal</span></div>`).join('');
          }
          if (gm.length) {
            sections += `<div class="ev-person-label"><span class="ev-person-dot" style="background:#5B7BA0"></span>Garth</div>`;
            sections += gm.map(m => `<div class="meal-chip"><span class="meal-chip-name">${m.n}</span><span class="meal-chip-kcal">${m.k} kcal</span></div>`).join('');
          }
          sections += `</div>`;
        }
      } else {
        const meals = dayData[key];
        if (meals.length) {
          sections += `<div class="wk-meal-section">
            <div class="wk-meal-label">${mealLabels[key]}</div>
            ${meals.map(m => `<div class="meal-chip"><span class="meal-chip-name">${m.n}</span><span class="meal-chip-kcal">${m.k} kcal</span></div>`).join('')}
          </div>`;
        }
      }
    });

    dayCols += `<div class="wk-day-col ${todayCls}" style="--col-i:${i}">

      <button class="wk-add-btn" onclick="openAddMealModal('${dayLabel}')" aria-label="Add meal to ${dayLabel}">+ Add</button>
    </div>`;
  });

  // Nutrition sidebar data (today)
  const todayDay = isEv ? planJen[TODAY] : plan[TODAY];
  const allMeals = todayDay.b.concat(todayDay.l,todayDay.d,todayDay.s);
  const totalKcal = allMeals.reduce((a,m)=>a+m.k,0);
  const kcalPct = Math.min(Math.round(totalKcal/goals.kcal*100), 100);
  const personName = {jen:'Jen',garth:'Garth',alex:'Alex',sam:'Sam',everyone:'Everyone'}[planPerson]||'Jen';
  const sidebarPerson = PEOPLE.find(p=>p.id===planPerson) || PEOPLE[0];

  document.getElementById('pane-planner').innerHTML = `

      <div class="pl-main">
        <div class="pl-toolbar">

          <button class="pl-nav-btn" aria-label="Previous week">‹ Prev</button>
          <button class="pl-nav-btn" aria-label="Next week">Next ›</button>
          <button class="pl-nav-btn" aria-label="Go to this week">This Week</button>
          <div class="pl-right-group">
            <button class="pl-new-btn" id="pl-new-toggle" onclick="toggleCreateRow()" aria-label="New plan">+ New Plan</button>
            <div class="pl-chip-sep"></div>
            ${!isEv ? `<button class="pl-nut-chip ${plNutOpen?'on':''}" id="pl-nut-toggle" aria-label="Toggle nutrition">${plNutOpen?'Nutrition ›':'‹ Nutrition'}</button>` : ''}
            <button class="pl-person-chip ${planPerson==='jen'?'on':''}" id="pl-p-jen" aria-label="Jen">Jen</button>
            <button class="pl-person-chip ${planPerson==='garth'?'on':''}" id="pl-p-garth" aria-label="Garth">Garth</button>
            <button class="pl-person-chip ${planPerson==='alex'?'on':''}" id="pl-p-alex" aria-label="Alex">Alex</button>
            <button class="pl-person-chip ${planPerson==='sam'?'on':''}" id="pl-p-sam" aria-label="Sam">Sam</button>
            <button class="pl-person-chip ${planPerson==='everyone'?'on':''}" id="pl-p-ev" aria-label="Everyone">Everyone</button>
            <button class="filter-demo-toggle ${plannerEmpty?'on':''}" onclick="plannerEmpty=!plannerEmpty;buildPlanner(planPerson)" title="Toggle empty state demo" aria-label="Demo empty state" style="margin-left:8px">Empty</button>
          </div>
        </div>
        <div class="pl-create-row" id="pl-create-row">

          <div class="pl-nut-rows">

let plNutOpen = false;
let plannerEmpty = false;
function togglePlNut() {
  plNutOpen = !plNutOpen;
  const el = document.getElementById('pl-right');
  if (el) el.classList.toggle('open', plNutOpen);
  const btn = document.getElementById('pl-nut-toggle');
  if (btn) {
    btn.classList.toggle('on', plNutOpen);
    btn.textContent = plNutOpen ? 'Nutrition ›' : '‹ Nutrition';
  }
}
function toggleCreateRow() {
  const row = document.getElementById('pl-create-row');
  if (!row) return;
  const isOpen = row.classList.toggle('open');
  const btn = document.getElementById('pl-new-toggle');
  if (btn) btn.textContent = isOpen ? '✕ Cancel' : '+ New Plan';
}
function toggleCopyMenu() {
  const menu = document.getElementById('pl-copy-menu');
  if (!menu) return;
  const isOpen = menu.classList.toggle('open');
  if (isOpen) {
    const close = (e) => { if (!e.target.closest('.pl-copy-wrap')) { menu.classList.remove('open'); document.removeEventListener('click', close); } };
    setTimeout(() => document.addEventListener('click', close), 0);
  }
}
function selectCopyOption(btn) {
  const menu = document.getElementById('pl-copy-menu');
  const display = document.getElementById('pl-copy-btn');
  menu.querySelectorAll('button').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  if (display) display.textContent = btn.textContent;
  menu.classList.remove('open');
}
function submitCreatePlan() {
  const btn = document.getElementById('pl-create-submit');
  if (!btn) return;
  btn.textContent = 'Creating…';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = 'Create';
    btn.disabled = false;
    const row = document.getElementById('pl-create-row');
    if (row && row.classList.contains('open')) toggleCreateRow();
  }, 1200);
}
function plBtnLoading(btn, loadingText, doneText) {
  const orig = btn.textContent;
  btn.textContent = loadingText;
  btn.disabled = true;
  btn.style.opacity = '0.5';
  setTimeout(() => {
    btn.textContent = doneText;
    btn.style.opacity = '1';
    setTimeout(() => {
      btn.textContent = orig;
      btn.disabled = false;
    }, 1000);
  }, 800);
}
function bindPlannerEvents() {
  const jenBtn = document.getElementById('pl-p-jen');
  const garthBtn = document.getElementById('pl-p-garth');
  const evBtn = document.getElementById('pl-p-ev');
  const nutBtn = document.getElementById('pl-nut-toggle');
  const createBtn = document.getElementById('pl-create-submit');
  if (jenBtn) jenBtn.addEventListener('click', () => buildPlanner('jen'));
  if (garthBtn) garthBtn.addEventListener('click', () => buildPlanner('garth'));
  const alexBtn = document.getElementById('pl-p-alex');
  const samBtn  = document.getElementById('pl-p-sam');
  if (alexBtn) alexBtn.addEventListener('click', () => buildPlanner('alex'));
  if (samBtn)  samBtn.addEventListener('click',  () => buildPlanner('sam'));
  if (evBtn) evBtn.addEventListener('click', () => buildPlanner('everyone'));
  if (nutBtn) nutBtn.addEventListener('click', togglePlNut);
  if (createBtn) createBtn.addEventListener('click', submitCreatePlan);
}

function planNutRow(label, val, unit, goalVal, isMax, isMin) {
  const p = Math.min(Math.round(val/goalVal*100), 100);
  let cls = 'fill-ok';
  if (isMax && val/goalVal > 1) cls = 'fill-err';
  if (isMin && val/goalVal < 1) cls = 'fill-warn';
  return `<div class="nut-row">
    <div class="nut-row-top">
      <span class="nut-name">${label}</span>
      <span class="nut-val">${val}${unit} <span class="nut-pct">/ ${goalVal}${unit}</span></span>
    </div>
    <div class="nut-track"><div class="nut-fill ${cls}" style="width:${p}%"></div></div>
  </div>`;
}

function scrollToSection(paneId, sectionId) {
  const pane = document.getElementById(paneId);
  const el = document.getElementById(sectionId);
  if (!el || !pane) return;
  const paneRect = pane.getBoundingClientRect();
  const elRect = el.getBoundingClientRect();
  const offset = pane.scrollTop + (elRect.top - paneRect.top) - 64;
  pane.scrollTo({ top: Math.max(0, offset), behavior: 'smooth' });
  // Immediately activate the clicked link (don't wait for scroll to settle)
  const sIds = pane._jumpNavSectionIds;
  if (sIds) {
    const idx = sIds.indexOf(sectionId);
    if (idx >= 0) {
      pane.querySelectorAll('.rd-jump-link').forEach((l, i) => l.classList.toggle('active', i === idx));
    }
  }
  // Lock scroll tracking while smooth scroll animates
  pane._jumpNavLocked = true;
  clearTimeout(pane._jumpNavLockTimeout);
  pane._jumpNavLockTimeout = setTimeout(() => { pane._jumpNavLocked = false; }, 800);
}

function initJumpNav(paneId, sectionIds) {
  const pane = document.getElementById(paneId);
  if (!pane) return;
  if (pane._jumpNavCleanup) pane._jumpNavCleanup();
  pane._jumpNavSectionIds = sectionIds;

  const links = Array.from(pane.querySelectorAll('.rd-jump-link'));
  if (!links.length) return;

  const update = () => {
    if (pane._jumpNavLocked) return;
    const paneRect = pane.getBoundingClientRect();
    const nearBottom = pane.scrollHeight - pane.scrollTop - pane.clientHeight < 60;
    let activeId = sectionIds[0];
    for (const id of sectionIds) {
      const el = document.getElementById(id);
      if (!el) continue;
      if (el.getBoundingClientRect().top - paneRect.top <= 100) activeId = id;
    }
    // Near bottom during manual scroll: pick last section in upper 60% of pane
    if (nearBottom) {
      for (const id of sectionIds) {
        const el = document.getElementById(id);
        if (!el) continue;
        if (el.getBoundingClientRect().top - paneRect.top < pane.clientHeight * 0.6) activeId = id;
      }
    }
    links.forEach((l, i) => l.classList.toggle('active', sectionIds[i] === activeId));
  };

  pane.addEventListener('scroll', update, { passive: true });
  pane._jumpNavCleanup = () => pane.removeEventListener('scroll', update);
  setTimeout(update, 50);
}

function initRfJumpNav() {
  initJumpNav('pane-recipe-form', ['rf-sec-basics','rf-sec-photo','rf-sec-ingredients','rf-sec-method','rf-sec-nutrition']);

function rfNutBar(label, val, unit, goalVal, focused) {

  const cls = val/goalVal > 1 ? 'fill-err' : 'fill-ok';
  return `<div class="rf-guidance-bar" style="opacity:${focused?1:0.4}">
    <div class="rf-guidance-bar-head">
      <span class="rf-guidance-bar-name">${label}</span>
      <span class="rf-guidance-bar-val">${val}${unit} / ${goalVal}${unit}</span>
    </div>
    <div class="ed-progress"><div class="ed-progress-fill ${cls}" style="width:${p}%"></div></div>
  </div>`;
}

  const wrap = inp.closest('.ed-autocomplete');

    wrap.querySelector('.ed-ac-list').innerHTML = matches.slice(0,5).map(p =>
      `<div class="ed-ac-item" onmousedown="this.closest('.ed-autocomplete').querySelector('input').value='${p.name}';this.closest('.ed-autocomplete').classList.remove('open')"><div>${p.name}</div><div class="ed-ac-item-sub">${p.cat} · ${p.kcal} kcal</div></div>`

    wrap.classList.add('open');
  } else {
    wrap.classList.remove('open');

}

/* ─── CUSTOM CURSOR ─── */
(function() {
  const dot = document.getElementById('cur-dot');
  const ring = document.getElementById('cur-ring');
  const label = document.getElementById('cur-label');
  let cx=-100,cy=-100,rx=-100,ry=-100;
  document.addEventListener('mousemove', e => {
    cx=e.clientX; cy=e.clientY;
    dot.style.left=cx+'px'; dot.style.top=cy+'px';
    label.style.left=(cx+22)+'px'; label.style.top=(cy-6)+'px';
  });
  (function tick() {
    rx+=(cx-rx)*0.1; ry+=(cy-ry)*0.1;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(tick);
  })();
  document.addEventListener('mouseover', e => {
    const card = e.target.closest('.rg-card,.ef-feature,.ef-side,.pt-card');
    const btn  = e.target.closest('button,.nav-link,.nav-logo');
    if (card) document.body.classList.add('cur-card');
    else if (btn) { document.body.classList.remove('cur-card'); document.body.classList.add('cur-btn'); }
    else document.body.classList.remove('cur-card','cur-btn');
  });
})();

/* ─── GETTING STARTED CHECKLIST ─── */
let gsVisible = true;
/* gsCollapsed removed — checklist always open until dismissed */
const gsStatus = { hasGoals:true, hasRecipe:true, hasIngredient:false, hasMealPlan:false, hasDashboard:false, hasMcp:false };
const GS_TASKS = [
  { id:'goals',     text:'Set nutrition goals',          note:'',                href:"goSettings('set-sec-goals')",      key:'hasGoals' },
  { id:'recipe',    text:'Import your first recipe',     note:'',                href:'goRecipes',                        key:'hasRecipe' },
  { id:'pantry',    text:'Add your first ingredient',    note:'',                href:'addIngredient',                    key:'hasIngredient' },
  { id:'plan',      text:'Plan your first week',         note:'',                href:'goPlanner',                        key:'hasMealPlan' },
  { id:'dashboard', text:'Personalize your dashboard',   note:'',                href:"goSettings('set-sec-dashboard')",  key:'hasDashboard' },
  { id:'ai',        text:'Set up AI optimization',       note:'Needs MCP setup', href:"goSettings('set-sec-mcp')",        key:'hasMcp' },
];

function buildGsCard() {
  if (!gsVisible) return '';
  const done = GS_TASKS.filter(t => gsStatus[t.key]).length;
  const total = GS_TASKS.length;
  const pct = Math.round((done / total) * 100);
  const allDone = done === total;
  const rows = GS_TASKS.map(t => {
    const isDone = gsStatus[t.key];
    const clickAction = t.href.includes('(') ? t.href : t.href + '()';
    return `<div class="gs-task ${isDone ? 'gs-done' : ''}" ${!isDone ? `onclick="${clickAction}"` : ''} role="${isDone ? 'listitem' : 'link'}" tabindex="0" aria-label="${t.text}${isDone ? ' — complete' : ''}">
      <div class="gs-check"><svg class="gs-check-svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg></div>
      <span class="gs-task-text">${t.text}${t.note && !isDone ? `<span class="gs-task-note">${t.note}</span>` : ''}</span>
      <svg class="gs-task-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join('');
  return `
    <div class="gs-card" id="gs-card" role="region" aria-label="Getting started checklist">
      <div class="gs-header" aria-label="Getting started — ${done} of ${total} complete">
        <span class="gs-title">Getting started</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="gs-count">${done} of ${total}</span>
          <svg class="gs-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="gs-progress"><div class="gs-progress-fill" style="width:${pct}%"></div></div>
      <div class="gs-body">
        ${rows}
        <div class="gs-footer">
          <button class="gs-dismiss" onclick="event.stopPropagation();gsDismiss()" aria-label="Dismiss getting started">${allDone ? 'Done — dismiss' : 'Dismiss'}</button>
        </div>
      </div>
    </div>`;
}

function gsDismiss() {
  const card = document.getElementById('gs-card');
  if (card) {
    card.classList.add('gs-exiting');
    card.style.maxHeight = card.offsetHeight + 'px';
    requestAnimationFrame(() => { card.style.maxHeight = '0'; });
    setTimeout(() => { gsVisible = false; card.remove(); }, 350);
  }
}

const dismissedTips = [];
function buildTip(tipId, label, text) {
  if (dismissedTips.includes(tipId)) return '';
  return `
    <div class="ctx-tip" id="tip-${tipId}" role="note" aria-label="${label}">
      <svg class="ctx-tip-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <div class="ctx-tip-body">
        <div class="ctx-tip-label">${label}</div>
        <div class="ctx-tip-text">${text}</div>
      </div>
      <button class="ctx-tip-close" onclick="dismissTip('${tipId}')" aria-label="Dismiss ${label} tip">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>`;
}

function dismissTip(tipId) {
  const el = document.getElementById('tip-' + tipId);
  if (el) {
    el.classList.add('ctx-exiting');
    setTimeout(() => { el.remove(); dismissedTips.push(tipId); }, 220);
  }
}

  // Below-fold: animate meals + week columns as they scroll into view
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('hm-in');
        observer.unobserve(entry.target);
      }
    });
  }, { root: pane, threshold: 0.1 });

  pane.querySelectorAll('.hm-meal-col').forEach((el, i) => {
    el.style.transitionDelay = `${i * 70}ms`;
    observer.observe(el);
  });
  pane.querySelectorAll('.hm-week-col').forEach((el, i) => {
    el.style.transitionDelay = `${i * 40}ms`;
    observer.observe(el);

/* ══════════════════════════════════════════════
   ONBOARDING COPY — edit all wizard text here
   ══════════════════════════════════════════════ */
const OB_COPY = {
  step1: {
    title:    'Measure what matters.',
    subtitle: 'Good Measure helps you and your household eat with intention. No calorie obsession, just clarity about what you\'re putting on the table.',
    cta:      'Get Started →',
  },
  step2: {
    title:       'Your profile.',
    subtitle:    'What should we call you? Pick a color. It\'ll be yours throughout the app.',
    nameLabel:   'Your name',
    namePH:      'Your name',
    colorLabel:  'Your color',
  },
  step3: {
    title:    'Your household.',
    subtitle: 'Add people you share meals with. Create an invite link for them to claim their profile and set their own goals.',
    nameLabel: 'Name',
    namePH:    'Add a household member',
    addBtn:    'Add',
    copyBtn:   'Copy',
    copyToast: 'Invite link copied',
  },
  step4: {
    title:    'Your goals.',
    subtitle: 'Pick a starting point. You can fine-tune every nutrient in Settings anytime.',
    presets: [
      { id:'balanced', name:'Balanced', desc:'General health, maintenance',  kcal:'2,000 kcal / day' },
      { id:'active',   name:'Active',   desc:'Higher protein, more fuel',    kcal:'2,500 kcal / day' },
      { id:'mindful',  name:'Mindful',  desc:'Lighter, focused portions',    kcal:'1,600 kcal / day' },
      { id:'custom',   name:'Custom',   desc:'I\'ll set my own targets',     kcal:'Set in Settings'  },
    ],
  },
  complete: {
    title:    'You\'re all set.',
    subtitle: 'Your household is ready.\nLet\'s start tracking what matters.',
    cta:      'Go to Dashboard →',
  },
};
/* ══════════════════════════════════════════════ */

let obStep = 1;
let obName = '';
let obTheme = 'coral';
let obMembers = [];
let obGoal = 'balanced';

function goOnboarding() {
  document.getElementById('nav').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('onboarding-screen').style.display = 'block';
  obStep = 1; obMembers = []; obGoal = 'balanced';
  renderObStep();
}

function exitOnboarding() {
  // reset state for next demo run
  document.querySelector('#onboarding-screen .ob-header').style.display = '';
  document.querySelector('#onboarding-screen .ob-wrap').classList.remove('ob-complete-wrap');
  document.getElementById('onboarding-screen').style.display = 'none';
  document.getElementById('nav').style.display = '';
  document.getElementById('app').style.display = '';
  goHome();
}

function renderObStep() {
  const counter = document.getElementById('ob-step-counter');
  const body = document.getElementById('ob-body');
  const wrap = document.querySelector('#onboarding-screen .ob-wrap');
  if (obStep > 4) {
    counter.textContent = '';
    document.querySelector('#onboarding-screen .ob-header').style.display = 'none';
    wrap.classList.add('ob-complete-wrap');
    body.innerHTML = renderObComplete();
    return;
  }
  document.querySelector('#onboarding-screen .ob-header').style.display = '';
  wrap.classList.remove('ob-complete-wrap');
  counter.textContent = obStep === 1 ? '' : `0${obStep - 1} / 03`;
  const renders = [null, renderObStep1, renderObStep2, renderObStep3, renderObStep4];
  body.innerHTML = renders[obStep]();
  // re-trigger animation
  body.style.animation = 'none';
  body.offsetHeight;
  body.style.animation = '';
}

function obFooter(showBack, showSkip, isLast) {
  const backBtn = (showBack && obStep > 1)
    ? `<button class="ob-back" onclick="obBack()" aria-label="Go back">← Back</button>`
    : `<span></span>`;
  const skipBtn = showSkip
    ? `<button class="ob-skip" onclick="obNext()" aria-label="Skip this step">Skip</button>`
    : '';
  const nextLabel = isLast ? 'Finish →' : 'Continue →';
  return `
    <div class="ob-footer">
      ${backBtn}
      <div style="display:flex;align-items:center;gap:20px">
        ${skipBtn}
        <button class="ob-next" onclick="obNext()" aria-label="${nextLabel}">${nextLabel}</button>
      </div>
    </div>`;
}

function renderObStep1() {
  const c = OB_COPY.step1;
  return `
    <div style="padding:clamp(20px,7vh,72px) 0 0">
      <div class="ob-title ob-title-hero">${c.title}</div>
      <div class="ob-subtitle" style="font-size:15px;line-height:1.7;margin-bottom:40px">${c.subtitle}</div>
      <button class="ob-next" onclick="obNext()" aria-label="${c.cta}">${c.cta}</button>
    </div>`;
}

function renderObStep2() {
  const swatches = THEMES.map(t => `
    <div class="ob-theme-swatch ${obTheme===t.id?'active':''}"
         style="background:${t.accent};--swatch-color:${t.accent}"
         title="${t.name}" onclick="obPickTheme('${t.id}')"
         role="button" aria-label="${t.name}" aria-pressed="${obTheme===t.id}"></div>
  `).join('');
  const activeName = (THEMES.find(t => t.id === obTheme) || {}).name || '';
  return `
    <div class="ob-title">${OB_COPY.step2.title}</div>
    <div class="ob-subtitle">${OB_COPY.step2.subtitle}</div>
    <div class="ed-field" style="margin-bottom:32px">
      <label class="ob-label" for="ob-name-input">${OB_COPY.step2.nameLabel}</label>
      <input class="ed-input" id="ob-name-input" type="text" value="${obName}"
             placeholder="${OB_COPY.step2.namePH}" oninput="obName=this.value" aria-label="${OB_COPY.step2.nameLabel}">
    </div>
    <div style="margin-bottom:32px">
      <label class="ob-label">${OB_COPY.step2.colorLabel}</label>
      <div class="ob-theme-grid">${swatches}</div>
    </div>
    ${obFooter(true, false, false)}`;
}

function renderObStep3() {
  const rows = obMembers.map(m => `
    <div class="ob-member-row">
      <div class="ob-member-dot" style="background:${m.color}"></div>
      <div class="ob-member-name">${m.name}</div>
      <div class="ob-member-invite">goodmeasure.app/invite/${m.code}</div>
      <button class="ob-member-copy" onclick="edToast('Invite link copied')" aria-label="Copy invite link for ${m.name}">Copy</button>
    </div>`).join('');
  return `
    <div class="ob-title">${OB_COPY.step3.title}</div>
    <div class="ob-subtitle">${OB_COPY.step3.subtitle}</div>
    <div class="ob-add-row">
      <div class="ed-field">
        <label class="ob-label" for="ob-member-input">${OB_COPY.step3.nameLabel}</label>
        <input class="ed-input" id="ob-member-input" type="text" placeholder="${OB_COPY.step3.namePH}"
               aria-label="Household member name"
               onkeydown="if(event.key==='Enter')obAddMember()">
      </div>
      <button class="ed-btn" onclick="obAddMember()" style="flex-shrink:0;align-self:flex-end" aria-label="Add member">${OB_COPY.step3.addBtn}</button>
    </div>
    <div class="ob-member-list" id="ob-member-list">${rows}</div>
    ${obFooter(true, true, false)}`;
}

function renderObStep4() {
  const c = OB_COPY.step4;
  const cards = c.presets.map(g => `
    <div class="ob-goal-card ${obGoal===g.id?'active':''}"
         onclick="obPickGoal('${g.id}')"
         role="button" aria-pressed="${obGoal===g.id}" aria-label="${g.name} goal">
      <div class="ob-goal-name">${g.name}</div>
      <div class="ob-goal-desc">${g.desc}</div>
      <div class="ob-goal-kcal">${g.kcal}</div>
    </div>`).join('');
  return `
    <div class="ob-title">${c.title}</div>
    <div class="ob-subtitle">${c.subtitle}</div>
    <div class="ob-goal-grid">${cards}</div>
    ${obFooter(true, false, true)}`;
}

function renderObComplete() {
  const c = OB_COPY.complete;
  return `
    <div class="ob-complete-card">
      <div class="ob-complete-check" aria-hidden="true">✓</div>
      <div class="ob-complete-title">${c.title}</div>
      <div class="ob-complete-sub">${c.subtitle.replace('\n','<br>')}</div>
      <button class="ob-next" onclick="exitOnboarding()" aria-label="${c.cta}">${c.cta}</button>
    </div>`;
}

function obNext() {
  obStep++;
  renderObStep();
}

function obBack() {
  if (obStep > 1) { obStep--; renderObStep(); }
}

function obPickTheme(id) {
  obTheme = id;
  // update swatches without full re-render
  document.querySelectorAll('.ob-theme-swatch').forEach(el => {
    el.classList.toggle('active', el.title === THEMES.find(t=>t.id===id).name);
    el.setAttribute('aria-pressed', el.title === THEMES.find(t=>t.id===id).name);
  });
  applyTheme(id);
}

function obPickGoal(id) {
  obGoal = id;
  document.querySelectorAll('.ob-goal-card').forEach(el => {
    const isActive = el.getAttribute('aria-label') === id + ' goal';
    el.classList.toggle('active', isActive);
    el.setAttribute('aria-pressed', isActive);
  });
  // re-render to update border colors cleanly
  const body = document.getElementById('ob-body');
  if (body) body.innerHTML = renderObStep4();
}

function obAddMember() {
  const input = document.getElementById('ob-member-input');
  const name = input ? input.value.trim() : '';
  if (!name) return;
  const usedIds = [obTheme, ...obMembers.map(m => m.themeId)];
  const theme = THEMES.find(t => !usedIds.includes(t.id)) || THEMES[1];
  const code = Math.random().toString(36).slice(2, 8);
  obMembers.push({ name, themeId: theme.id, color: theme.accent, code });
  const list = document.getElementById('ob-member-list');
  if (list) {
    list.innerHTML = obMembers.map(m => `
      <div class="ob-member-row">
        <div class="ob-member-dot" style="background:${m.color}"></div>
        <div class="ob-member-name">${m.name}</div>
        <div class="ob-member-invite">goodmeasure.app/invite/${m.code}</div>
        <button class="ob-member-copy" onclick="edToast('${OB_COPY.step3.copyToast}')" aria-label="Copy invite link for ${m.name}">${OB_COPY.step3.copyBtn}</button>
      </div>`).join('');
  }
  if (input) input.value = '';
  input.focus();
}
