<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Good Measure — Auth (mockup v1)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #F5F4EF;
    --bg-2:  #EEEAE3;
    --bg-3:  #E6E2D8;
    --fg:    #1A1916;
    --fg-2:  #36342F;
    --muted: #6B6860;
    --rule:  #D0CCC2;
    --accent: #5A9B6A;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'DM Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  em { font-style: normal; color: var(--accent); }

  /* Top nav — mirrors the landing */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    border-bottom: 1px solid var(--rule);
  }
  .nav-logo { font-size: 13px; font-weight: 700; letter-spacing: -0.02em; color: var(--fg); text-decoration: none; }
  .nav-right { display: flex; align-items: center; gap: 24px; }
  .nav-link {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--fg); text-decoration: none;
  }
  .nav-cta {
    background: var(--fg); color: var(--bg);
    padding: 8px 14px; border: none; border-radius: 0;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    text-decoration: none;
  }

  /* Two-column split */
  .split {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    min-height: calc(100vh - 57px);
  }

  /* LEFT — editorial side */
  .left {
    padding: 48px 56px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-right: 1px solid var(--rule);
  }
  .eyebrow {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .headline {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: clamp(40px, 4.5vw, 60px);
    line-height: 1.05;
    font-weight: 500;
    letter-spacing: -0.035em;
    margin: 0 0 28px;
    text-wrap: balance;
    max-width: 560px;
  }
  .lede {
    font-size: 14px;
    line-height: 1.7;
    color: var(--fg-2);
    margin: 0;
    max-width: 420px;
    text-wrap: pretty;
  }
  .left-footer {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }

  /* RIGHT — form side */
  .right {
    padding: 48px 64px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .form-wrap { width: 100%; max-width: 380px; margin: 0 auto; }

  .tabs {
    display: flex; gap: 28px;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--rule);
  }
  .tab {
    background: none; border: none; padding: 0 0 12px; cursor: pointer;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    position: relative;
  }
  .tab.active { color: var(--fg); }
  .tab.active::after {
    content: '';
    position: absolute; left: 0; right: 0; bottom: -1px; height: 1.5px;
    background: var(--fg);
  }

  .field { display: block; margin-bottom: 24px; }
  .label {
    display: block;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .label-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .label-link {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); text-decoration: none;
  }
  .input {
    width: 100%;
    background: none; border: none;
    border-bottom: 1px solid var(--rule);
    padding: 6px 0;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 13px; color: var(--fg);
    outline: none; border-radius: 0;
  }
  .input:focus { border-bottom-color: var(--fg); }
  .input.password { letter-spacing: 0.15em; }

  .submit {
    width: 100%;
    background: var(--fg); color: var(--bg);
    border: 1px solid var(--fg); border-radius: 0;
    padding: 12px 14px;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
    margin: 8px 0 20px;
  }

  .or {
    display: flex; align-items: center; gap: 12px;
    margin: 4px 0 16px;
  }
  .or-rule { flex: 1; height: 1px; background: var(--rule); }
  .or-text {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
  }

  .oauth { display: flex; flex-direction: column; gap: 8px; }
  .oauth-btn {
    width: 100%;
    background: none; color: var(--fg);
    border: 1px solid var(--rule); border-radius: 0;
    padding: 12px 14px;
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .oauth-btn:hover { border-color: var(--fg); }

  .terms {
    font-family: 'DM Mono', ui-monospace, monospace;
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin: 36px 0 0;
    line-height: 1.7;
  }
  .terms a { color: var(--fg); text-decoration: underline; text-underline-offset: 3px; }

  @media (max-width: 760px) {
    .split { grid-template-columns: 1fr; min-height: 0; }
    .left { border-right: none; border-bottom: 1px solid var(--rule); padding: 40px 28px; }
    .right { padding: 40px 28px; }
    .nav { padding: 16px 24px; }
  }
</style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">Good Measure</a>
    <div class="nav-right">
      <a href="/" class="nav-link">← Back</a>
    </div>
  </nav>

  <main class="split">

    <section class="left">
      <div></div>

      <div>
        <div class="eyebrow">§ Sign in</div>
        <h1 class="headline">Pick up where you <em>left off.</em></h1>
        <p class="lede">Your pantry, your recipes, and the week you were planning, all waiting.</p>
      </div>

      <div class="left-footer">© 2026 · Made by Jen Murse</div>
    </section>

    <section class="right">
      <div class="form-wrap">

        <div class="tabs">
          <button class="tab active" id="tab-signin" onclick="setMode('signin')">Sign in</button>
          <button class="tab" id="tab-create" onclick="setMode('create')">Create account</button>
        </div>

        <label class="field">
          <span class="label">Email</span>
          <input class="input" type="email" placeholder="you@example.com" />
        </label>

        <div class="field" id="name-field" style="display: none;">
          <span class="label">Your name</span>
          <input class="input" type="text" placeholder="Jen" />
        </div>

        <label class="field">
          <span class="label-row">
            <span class="label" style="margin-bottom: 0;">Password</span>
            <a href="#" class="label-link">Forgot</a>
          </span>
          <input class="input password" type="password" placeholder="••••••••••" />
        </label>

        <button class="submit" id="submit-btn">Sign in</button>

        <div class="or">
          <div class="or-rule"></div>
          <span class="or-text">Or</span>
          <div class="or-rule"></div>
        </div>

        <div class="oauth">
          <button class="oauth-btn">
            <svg width="13" height="13" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.49h4.84a4.13 4.13 0 0 1-1.79 2.71v2.26h2.9c1.7-1.56 2.69-3.86 2.69-6.62Z"/>
              <path fill="#34A853" d="M9 18c2.43 0 4.46-.81 5.95-2.18l-2.9-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.33-1.58-5.04-3.7H.96v2.33A9 9 0 0 0 9 18Z"/>
              <path fill="#FBBC05" d="M3.96 10.71A5.41 5.41 0 0 1 3.68 9c0-.59.1-1.17.28-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.04l3-2.33Z"/>
              <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.94 8.94 0 0 0 9 0 9 9 0 0 0 .96 4.96l3 2.33C4.67 5.16 6.66 3.58 9 3.58Z"/>
            </svg>
            Continue with Google
          </button>
          <button class="oauth-btn">
            <svg width="13" height="13" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path fill="#1A1916" d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
            </svg>
            Continue with Apple
          </button>
        </div>

        <p class="terms">
          By signing in you agree to our <a href="#">terms</a>
        </p>

      </div>
    </section>

  </main>

<script>
  function setMode(mode) {
    const signinTab = document.getElementById('tab-signin');
    const createTab = document.getElementById('tab-create');
    const submitBtn = document.getElementById('submit-btn');
    const nameField = document.getElementById('name-field');
    const headline = document.querySelector('.headline');
    const eyebrow = document.querySelector('.eyebrow');
    const lede = document.querySelector('.lede');

    if (mode === 'signin') {
      signinTab.classList.add('active');
      createTab.classList.remove('active');
      submitBtn.textContent = 'Sign in';
      nameField.style.display = 'none';
      eyebrow.textContent = '§ Sign in';
      headline.innerHTML = 'Pick up where you <em>left off.</em>';
      lede.textContent = 'Your pantry, your recipes, and the week you were planning, all waiting.';
    } else {
      createTab.classList.add('active');
      signinTab.classList.remove('active');
      submitBtn.textContent = 'Create account';
      nameField.style.display = 'block';
      eyebrow.textContent = '§ Create account';
      headline.innerHTML = 'Cook for your <em>household.</em>';
      lede.textContent = 'Build your pantry once, plan the week, and let the math take care of itself.';
    }
  }
</script>
</body>
</html>
