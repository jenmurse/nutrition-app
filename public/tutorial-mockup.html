<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Measure — Tutorial System Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #F4F2EF;
      --bg-nav:       #FFFFFF;
      --card:         #FFFFFF;
      --fg:           #1A1A1A;
      --fg-sub:       #333333;
      --muted:        #888888;
      --accent:       #5C9169;
      --accent-hover: #4A7A56;
      --accent-light: #EEF4F0;
      --rule:         #E5E5E5;
      --rule-strong:  #D0D0D0;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
      --mono:  'DM Mono', 'Courier New', monospace;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --radius: 12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      color: var(--fg);
    }

    /* ─── Mockup toolbar ─── */
    .mockup-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: #1A1A1A;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      z-index: 100;
    }
    .mockup-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .mockup-badge strong { color: white; font-weight: 400; }
    .mockup-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.2); }
    .state-toggle {
      display: flex;
      gap: 2px;
      margin-left: auto;
    }
    .state-opt {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      padding: 4px 9px;
      border-radius: 3px;
      cursor: pointer;
      transition: color 140ms, background 140ms;
      border: none;
      background: transparent;
    }
    .state-opt.active { color: white; background: rgba(255,255,255,0.12); }

    /* ─── Page shell ─── */
    .page {
      padding-top: 36px;
      min-height: 100vh;
      display: flex;
    }

    /* ─── App nav ─── */
    .app-nav {
      height: 52px;
      background: var(--bg-nav);
      display: flex;
      align-items: center;
      padding: 0 24px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);
      position: sticky;
      top: 36px;
      z-index: 10;
      flex-shrink: 0;
    }
    .nav-brand {
      font-family: var(--serif);
      font-size: 16px;
      letter-spacing: 0.02em;
      color: var(--fg);
      margin-right: 24px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
    }
    .nav-link {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      transition: color 120ms, background 120ms;
      border: none;
      background: transparent;
    }
    .nav-link:hover { color: var(--fg); background: rgba(0,0,0,0.03); }
    .nav-link.active { color: var(--fg); background: var(--accent-light); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .person-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      color: white;
      box-shadow: 0 0 0 2px var(--bg-nav), 0 0 0 4px var(--accent);
    }

    /* ─── Layout ─── */
    .shell {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .main-content {
      flex: 1;
      display: flex;
    }
    .dashboard-area {
      flex: 1;
      padding: 28px 32px;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .notes-sidebar {
      width: 300px;
      flex-shrink: 0;
      border-left: 1px solid var(--rule);
      background: white;
      padding: 48px 28px;
      overflow-y: auto;
    }

    /* ─── Getting Started Card ─── */
    .gs-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.04),
        0 2px 4px rgba(0,0,0,0.04),
        0 8px 24px rgba(0,0,0,0.06);
      overflow: hidden;
      transition: box-shadow 200ms ease;
    }

    .gs-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .gs-header:hover { background: rgba(0,0,0,0.01); }

    .gs-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      flex: 1;
    }

    .gs-progress-pill {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-light);
      padding: 3px 8px;
      border-radius: 20px;
    }

    .gs-collapse-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 140ms ease, transform 200ms var(--ease-out);
    }
    .gs-collapse-btn.collapsed { transform: rotate(-90deg); }

    .gs-progress-bar {
      height: 2px;
      background: var(--rule);
      margin: 0 20px;
      transition: opacity 250ms ease, max-height 300ms var(--ease-out);
      overflow: hidden;
      max-height: 2px;
      opacity: 1;
    }
    .gs-progress-bar.collapsed {
      max-height: 0;
      opacity: 0;
    }
    .gs-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 400ms var(--ease-out);
    }

    .gs-body {
      padding: 16px 20px 20px;
      overflow: hidden;
      transition: max-height 300ms var(--ease-out), opacity 250ms ease, padding 300ms var(--ease-out);
      max-height: 600px;
      opacity: 1;
    }
    .gs-body.collapsed {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    .gs-tasks {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .gs-task {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--rule);
      cursor: pointer;
      transition: background 140ms ease;
      border-radius: 6px;
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
    }
    .gs-task:last-child { border-bottom: none; }
    .gs-task:hover { background: rgba(0,0,0,0.02); }
    .gs-task.done { cursor: default; }
    .gs-task.done:hover { background: transparent; }

    .gs-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1.5px solid var(--rule-strong);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 200ms ease, border-color 200ms ease;
    }
    .gs-task.done .gs-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .gs-task-text {
      flex: 1;
      font-size: 13px;
      color: var(--fg);
      line-height: 1.4;
    }
    .gs-task.done .gs-task-text {
      color: var(--muted);
      text-decoration: line-through;
      text-decoration-color: var(--rule-strong);
    }

    .gs-task-note {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .gs-task.done .gs-task-note { display: none; }

    .gs-arrow {
      color: var(--muted);
      font-size: 12px;
      transition: transform 140ms ease, color 140ms ease;
    }
    .gs-task:hover .gs-arrow { transform: translateX(2px); color: var(--fg); }
    .gs-task.done .gs-arrow { display: none; }

    .gs-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-top: 14px;
    }
    .gs-dismiss {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 140ms ease;
    }
    .gs-dismiss:hover { color: var(--fg); }

    /* ─── Dashboard content (mock) ─── */
    .section-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .today-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.04),
        0 2px 4px rgba(0,0,0,0.04),
        0 8px 24px rgba(0,0,0,0.06);
    }

    .today-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 18px;
    }
    .today-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
      flex: 1;
    }
    .today-date {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .nut-item { }
    .nut-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .nut-val {
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 600;
      color: var(--fg);
      letter-spacing: -0.02em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .nut-of {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .nut-bar {
      height: 3px;
      background: var(--rule);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .nut-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ─── Empty state ─── */
    .empty-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 24px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.04),
        0 2px 4px rgba(0,0,0,0.04);
      text-align: center;
    }
    .empty-icon {
      font-size: 28px;
      margin-bottom: 12px;
    }
    .empty-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 6px;
    }
    .empty-desc {
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      max-width: 280px;
      margin: 0 auto 16px;
      text-wrap: pretty;
    }
    .empty-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: white;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 140ms ease, transform 140ms ease-out;
    }
    .empty-cta:hover { background: var(--accent-hover); }
    .empty-cta:active { transform: scale(0.97); }

    /* ─── Contextual tip card ─── */
    .tip-card {
      background: var(--accent-light);
      border: 1px solid rgba(92,145,105,0.2);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      position: relative;
    }
    .tip-icon {
      font-size: 16px;
      flex-shrink: 0;
      line-height: 1.4;
    }
    .tip-content { flex: 1; }
    .tip-label {
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .tip-text {
      font-size: 12px;
      line-height: 1.6;
      color: var(--fg-sub);
      text-wrap: pretty;
    }
    .tip-close {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 16px;
      line-height: 1;
      padding: 0;
      flex-shrink: 0;
      transition: color 140ms ease;
    }
    .tip-close:hover { color: var(--fg); }

    /* ─── Notes sidebar ─── */
    .notes-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .notes-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }
    .note-section { margin-bottom: 24px; }
    .note-section-title {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .note-section ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .note-section ul li {
      font-size: 12px;
      line-height: 1.55;
      color: var(--fg-sub);
      letter-spacing: 0.02em;
      padding-left: 14px;
      position: relative;
    }
    .note-section ul li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--muted);
      font-size: 10px;
    }
    .note-code {
      font-family: var(--mono);
      font-size: 10px;
      background: #F0F0F0;
      border-radius: 4px;
      padding: 2px 5px;
      color: var(--fg);
    }
    .note-step-title {
      font-family: var(--sans);
      font-size: 17px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 16px;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }
    .sep { height: 1px; background: var(--rule); margin: 20px 0; }

    @media (max-width: 900px) {
      .notes-sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- Mockup toolbar -->
<div class="mockup-header">
  <span class="mockup-badge"><strong data-brand></strong></span>
  <div class="mockup-sep"></div>
  <span class="mockup-badge">Tutorial System Mockup · Getting Started checklist + contextual tips</span>
  <div class="state-toggle">
    <button class="state-opt active" onclick="setState('new',this)">New user</button>
    <button class="state-opt" onclick="setState('mid',this)">Midway</button>
    <button class="state-opt" onclick="setState('done',this)">All done</button>
    <button class="state-opt" onclick="setState('collapsed',this)">Collapsed</button>
    <button class="state-opt" onclick="setState('dismissed',this)">Dismissed</button>
  </div>
</div>

<div class="page">
  <div class="shell">

    <!-- App nav -->
    <nav class="app-nav">
      <span class="nav-brand" data-brand></span>
      <div class="nav-links">
        <button class="nav-link active">Dashboard</button>
        <button class="nav-link">Meal Plans</button>
        <button class="nav-link">Recipes</button>
        <button class="nav-link">Pantry</button>
      </div>
      <div class="nav-right">
        <div class="person-dot">J</div>
      </div>
    </nav>

    <div class="main-content">
      <div class="dashboard-area">

        <!-- ── Getting Started card ── -->
        <div id="gs-card-wrap">
          <div class="gs-card" id="gs-card">
            <div class="gs-header" onclick="toggleCollapse()">
              <div class="gs-title">Getting started</div>
              <div class="gs-progress-pill" id="gs-pill">0 of 6</div>
              <button class="gs-collapse-btn" id="gs-collapse-btn" aria-label="Collapse" onclick="event.stopPropagation(); toggleCollapse()">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
            <div class="gs-progress-bar">
              <div class="gs-progress-fill" id="gs-fill" style="width: 0%"></div>
            </div>
            <div class="gs-body" id="gs-body">
              <ul class="gs-tasks" id="gs-tasks">
                <!-- tasks injected by JS -->
              </ul>
              <div class="gs-footer">
                <button class="gs-dismiss" onclick="dismissCard()">Dismiss</button>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /dashboard-area -->

    </div><!-- /main-content -->
  </div><!-- /shell -->
</div><!-- /page -->

<script>
  const APP_NAME = 'Good Measure';
  document.querySelectorAll('[data-brand]').forEach(el => el.textContent = APP_NAME);

  const TASKS = [
    { id: 'goals',     text: 'Nutrition goals set',       note: 'Active · 2,500 kcal', href: '/settings' },
    { id: 'recipe',    text: 'Import your first recipe',  note: '',                    href: '/recipes' },
    { id: 'pantry',    text: 'Add your first ingredient',  note: '',                   href: '/ingredients' },
    { id: 'plan',      text: 'Plan your first week',      note: '',                    href: '/meal-plans' },
    { id: 'ai',        text: 'Set up AI optimization',    note: 'Needs MCP setup',     href: '/settings#ai' },
  ];

  // States: which tasks are done in each view mode
  const STATES = {
    new:       [false, false, false, false, false],
    mid:       [true,  true,  true,  false, false],
    done:      [true,  true,  true,  true,  true],
    collapsed: [true,  true,  false, false, false],
    dismissed: [true,  true,  false, false, false],
  };

  let currentDone = [...STATES.new];
  let isCollapsed = false;

  function buildTasks(done) {
    const ul = document.getElementById('gs-tasks');
    ul.innerHTML = '';
    done.forEach((isDone, i) => {
      const t = TASKS[i];
      const li = document.createElement('li');
      li.className = 'gs-task' + (isDone ? ' done' : '');
      li.innerHTML = `
        <div class="gs-check">
          ${isDone ? `<svg width="9" height="7" viewBox="0 0 9 7" fill="none">
            <path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>` : ''}
        </div>
        <div class="gs-task-text">${t.text}${t.note && isDone ? ` <span style="color:var(--muted);font-size:11px;">· ${t.note}</span>` : ''}</div>
        ${!isDone && t.note ? `<span class="gs-task-note">${t.note}</span>` : ''}
        ${!isDone ? `<span class="gs-arrow">›</span>` : ''}
      `;
      if (!isDone) {
        li.onclick = () => {
          currentDone[i] = true;
          updateCard(currentDone);
        };
      }
      ul.appendChild(li);
    });
  }

  function updateCard(done) {
    const count = done.filter(Boolean).length;
    document.getElementById('gs-pill').textContent = `${count} of ${done.length}`;
    document.getElementById('gs-fill').style.width = `${(count / done.length) * 100}%`;
    buildTasks(done);
  }

  function toggleCollapse() {
    isCollapsed = !isCollapsed;
    const body = document.getElementById('gs-body');
    const bar = document.querySelector('.gs-progress-bar');
    const btn = document.getElementById('gs-collapse-btn');
    body.classList.toggle('collapsed', isCollapsed);
    bar.classList.toggle('collapsed', isCollapsed);
    btn.classList.toggle('collapsed', isCollapsed);
  }

  function dismissCard() {
    const wrap = document.getElementById('gs-card-wrap');
    wrap.style.maxHeight = wrap.offsetHeight + 'px';
    requestAnimationFrame(() => {
      wrap.style.transition = 'max-height 280ms cubic-bezier(0.23,1,0.32,1), opacity 220ms ease';
      wrap.style.overflow = 'hidden';
      wrap.style.maxHeight = '0';
      wrap.style.opacity = '0';
    });
    setTimeout(() => wrap.remove(), 320);
  }

  function setState(mode, btn) {
    document.querySelectorAll('.state-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Restore card if dismissed
    const wrap = document.getElementById('gs-card-wrap');

    if (mode === 'dismissed') {
      dismissCard();
      return;
    }

    // Re-add card if missing (dismissed state → another state)
    if (!wrap || !wrap.parentNode) {
      location.reload();
      return;
    }
    wrap.style.maxHeight = '';
    wrap.style.opacity = '';
    wrap.style.transition = '';
    wrap.style.overflow = '';

    currentDone = [...STATES[mode]];
    updateCard(currentDone);

    if (mode === 'collapsed') {
      if (!isCollapsed) toggleCollapse();
    } else {
      if (isCollapsed) toggleCollapse();
    }
  }

  // Init
  updateCard(currentDone);
  lucide.createIcons();
</script>
</body>
</html>
